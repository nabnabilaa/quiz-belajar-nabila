<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academy Quiz Prep — Apple Developer Academy Indonesia</title>
<style>
  :root{
    --bg1:#06060F;--bg2:#0D0D20;--fg:#F5F5F7;--muted:#8E8E93;--dim:#636366;--faint:#3A3A3C;
    --indigo:#5E5CE6;--blue:#0071E3;--green:#32D74B;--red:#FF453A;--teal:#30E3CA;--orange:#FF9F0A;
    --idcol:#9a98c9;
    --font:-apple-system,'SF Pro Display',BlinkMacSystemFont,system-ui,sans-serif;
    --mono:'SF Mono','Fira Code','Courier New',monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(150deg,var(--bg1) 0%,var(--bg2) 55%,#07060F 100%);
       background-attachment:fixed;color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;padding:24px 20px}
  .wrap{max-width:640px;margin:0 auto}
  code{font-family:var(--mono);font-size:.85em;background:rgba(255,255,255,.1);border-radius:4px;padding:1px 5px;color:#e0e0f0}
  pre{font-family:var(--mono);font-size:13px;line-height:1.6;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);
      border-radius:12px;padding:13px 15px;margin:10px 0 0;overflow-x:auto;color:#e6e6f0;white-space:pre}
  button{font-family:var(--font);cursor:pointer;border:none}
  .id{color:var(--idcol);font-style:italic}
  .center{display:flex;flex-direction:column;align-items:center}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .brand{text-align:center;margin:10px 0 22px}
  .logo{font-size:52px;margin-bottom:14px;animation:float 3.8s ease-in-out infinite}
  h1{font-size:26px;font-weight:800;margin:0 0 6px;letter-spacing:-.5px}
  .sub{color:var(--dim);margin:0 0 8px;font-size:14px}
  .pill{display:inline-block;background:rgba(94,92,230,.18);color:#a8a6f8;border-radius:99px;padding:2px 12px;font-size:12px;font-weight:600}
  .who{display:flex;gap:8px;align-items:center;justify-content:center;margin:0 auto 16px;max-width:460px}
  .who label{font-size:12px;color:var(--dim)}
  .who input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--fg);
             border-radius:9px;padding:7px 11px;font-size:13px;font-family:var(--font);max-width:150px}
  .sync{font-size:11px;border-radius:99px;padding:2px 10px;font-weight:600}
  .tabs{display:flex;gap:10px;margin:0 auto 14px;max-width:460px}
  .tab{flex:1;padding:12px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
       color:var(--muted);font-size:14px;font-weight:700;transition:.16s}
  .tab.active.logic{background:rgba(94,92,230,.18);border-color:rgba(94,92,230,.5);color:#bcbbf9}
  .tab.active.programming{background:rgba(0,113,227,.18);border-color:rgba(0,113,227,.5);color:#8fc4ff}
  .meta{color:var(--dim);font-size:13px;text-align:center;margin:0 auto 16px;max-width:480px;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px;max-width:460px;margin:0 auto}
  .cell{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.16s;padding:6px}
  .cell:hover{transform:translateY(-2px);background:rgba(255,255,255,.07)}
  .cell .n{font-size:18px;font-weight:800}.cell .lbl{font-size:10px;color:var(--dim)}.cell .best{font-size:11px;font-weight:700}
  .cell.done{border-color:rgba(50,215,75,.35)}
  .foot{color:var(--faint);font-size:12px;text-align:center;margin-top:26px;line-height:1.6}

  .bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:18px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--indigo),var(--blue));border-radius:2px;transition:width .4s ease}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .top .t{color:var(--dim);font-size:13px}.top .qn{font-weight:700}.top .qn span{color:var(--faint);font-weight:400}
  .top .sc{background:rgba(50,215,75,.14);color:var(--green);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700}
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.075);border-radius:16px;padding:16px 18px;margin-bottom:13px}
  .card .en{font-size:15px;line-height:1.7;white-space:pre-wrap}
  .card .id{font-size:13.5px;line-height:1.6;white-space:pre-wrap;margin-top:9px;padding-top:9px;border-top:1px dashed rgba(255,255,255,.1)}
  .opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
  .opt{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;border-radius:13px;padding:12px 14px;
       background:rgba(255,255,255,.038);border:1px solid rgba(255,255,255,.075);color:var(--fg);font-size:14px;line-height:1.55;transition:.16s}
  .opt:not(:disabled):hover{background:rgba(255,255,255,.07)}.opt:not(:disabled):active{transform:scale(.99)}
  .opt:disabled{cursor:default}
  .opt .badge{width:27px;height:27px;border-radius:7px;flex-shrink:0;background:rgba(255,255,255,.09);color:var(--dim);
              display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .opt .otxt{display:flex;flex-direction:column;gap:3px}
  .opt .oid{font-size:12.5px;color:var(--idcol);font-style:italic}
  .opt.correct{background:rgba(50,215,75,.1);border-color:rgba(50,215,75,.4)}
  .opt.correct .badge{background:rgba(50,215,75,.22);color:var(--green)}
  .opt.wrong{background:rgba(255,69,58,.1);border-color:rgba(255,69,58,.4)}
  .opt.wrong .badge{background:rgba(255,69,58,.22);color:var(--red)}
  .opt.faded{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.04);color:var(--faint)}
  .opt.faded .oid{color:var(--faint)}
  .expl{border-radius:13px;padding:13px 16px;margin-bottom:14px;border:1px solid}
  .expl.ok{background:rgba(50,215,75,.07);border-color:rgba(50,215,75,.22)}
  .expl.no{background:rgba(255,69,58,.07);border-color:rgba(255,69,58,.22)}
  .expl .h{margin:0 0 7px;font-size:13px;font-weight:700}
  .expl.ok .h{color:var(--green)}.expl.no .h{color:var(--red)}
  .expl .en{margin:0;font-size:13px;color:#C7C7CC;line-height:1.65}
  .expl .id{margin:7px 0 0;padding-top:7px;border-top:1px dashed rgba(255,255,255,.12);font-size:13px;line-height:1.65}
  .next{padding:13px;border-radius:13px;width:100%;background:linear-gradient(135deg,var(--indigo),var(--blue));color:#fff;font-size:15px;font-weight:700}
  .ghost{background:rgba(255,255,255,.07);color:var(--fg);font-weight:600}

  .score-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.075);border-radius:20px;padding:26px 22px;text-align:center;margin-bottom:14px}
  .ring{width:100px;height:100px;border-radius:50%;margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid}
  .ring .big{font-size:34px;font-weight:800;line-height:1}.ring .of{font-size:12px;color:var(--dim)}
  .chips{display:flex;gap:10px;margin-bottom:14px}
  .chip{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:13px 8px;text-align:center}
  .chip .v{font-size:22px;font-weight:800}.chip .l{font-size:12px;color:var(--dim);margin-top:3px}
  .row{display:flex;gap:10px;margin-bottom:22px}.row button{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700}
  .wrongs{display:flex;flex-direction:column;gap:10px}
  .wbox{background:rgba(255,69,58,.06);border:1px solid rgba(255,69,58,.13);border-radius:13px;padding:13px 15px}
  .wbox .q{margin:0 0 10px;font-size:13px;line-height:1.6;font-weight:500;white-space:pre-wrap}
  .wbox .ya{margin:0 0 3px;font-size:12px;color:var(--red)}.wbox .ca{margin:0 0 9px;font-size:12px;color:var(--green)}
  .wbox .ex{margin:0;font-size:12px;color:var(--muted);line-height:1.6}
  .toggle{width:100%;padding:11px 16px;border-radius:11px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--fg);font-size:14px;font-weight:600;margin-bottom:12px}
  .perfect{text-align:center;padding:20px;color:var(--green);font-size:14px;font-weight:600}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script id="bank" type="application/json">{"meta":{"title":"Apple Developer Academy Quiz Prep","questionsPerSession":50,"topics":{"logic":{"label":"Logic Test","label_id":"Tes Logika","total":1000,"sessions":20},"programming":{"label":"Programming Test","label_id":"Tes Pemrograman","total":1000,"sessions":20}}},"logic":[{"id":1,"question":"Find the value of ? in the grid:\n  8   11   14\n 13   16   19\n 18   21    ?","question_id":"Cari nilai ? dalam tabel berikut:\n  8   11   14\n 13   16   19\n 18   21    ?","options":["45","51","53","24"],"correct":3,"explanation":"Across each row the value rises by 3 per column; down each column it rises by 5 per row. So ? = 24.","explanation_id":"Di setiap baris nilainya naik 3 per kolom; di setiap kolom naik 5 per baris. Maka ? = 24."},{"id":2,"question":"Find the missing number (?):\n3, 13, ?, 33, 43, 53","question_id":"Cari angka yang hilang (?):\n3, 13, ?, 33, 43, 53","options":["47","36","23","56"],"correct":2,"explanation":"The sequence rises by 10 each step. The term before ? is 13, so ? = 13+10 = 23.","explanation_id":"Barisan naik 10 tiap langkah. Suku sebelum ? adalah 13, jadi ? = 13+10 = 23."},{"id":3,"question":"Which letter comes next?\nH, I, J, K, L, ?","question_id":"Huruf apa berikutnya?\nH, I, J, K, L, ?","options":["N","M ","L","M"],"correct":3,"explanation":"Each letter advances by 1 position(s) in the alphabet. After L, skipping 1, gives M.","explanation_id":"Setiap huruf maju 1 posisi dalam alfabet. Setelah L, lompat 1, menjadi M."},{"id":4,"question":"Which letter comes next?\nB, D, F, H, J, ?","question_id":"Huruf apa berikutnya?\nB, D, F, H, J, ?","options":["M","K","L","N"],"correct":2,"explanation":"Each letter advances by 2 position(s) in the alphabet. After J, skipping 2, gives L.","explanation_id":"Setiap huruf maju 2 posisi dalam alfabet. Setelah J, lompat 2, menjadi L."},{"id":5,"question":"In a certain code, ARRAY is written as FWWFD.\nHow is QUEUE written in that code?","question_id":"Dalam sebuah kode rahasia, ARRAY ditulis sebagai FWWFD.\nBagaimana QUEUE ditulis dalam kode itu?","options":["WAKAK","UYIYI","XBLBL","VZJZJ"],"correct":3,"explanation":"Each letter shifts forward by 5 position(s) (wrapping Z->A). The same shift on QUEUE gives VZJZJ.","explanation_id":"Setiap huruf digeser maju 5 posisi (memutar Z->A). Geseran yang sama pada QUEUE menghasilkan VZJZJ."},{"id":6,"question":"Find the missing number (?):\n4, ?, 10, 13, 16, 19","question_id":"Cari angka yang hilang (?):\n4, ?, 10, 13, 16, 19","options":["17","15","11","7"],"correct":3,"explanation":"The sequence rises by 3 each step. The term before ? is 4, so ? = 4+3 = 7.","explanation_id":"Barisan naik 3 tiap langkah. Suku sebelum ? adalah 4, jadi ? = 4+3 = 7."},{"id":7,"question":"What number comes next in the sequence?\n15, 19, 23, 27, 31, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n15, 19, 23, 27, 31, ?","options":["31","39","35","43"],"correct":2,"explanation":"The sequence changes by a constant difference of 4 each step (arithmetic progression). 31 + (4) = 35.","explanation_id":"Barisan ini berubah dengan selisih tetap 4 di setiap langkah (barisan aritmetika). 31 + (4) = 35."},{"id":8,"question":"What number comes next in the sequence?\n3, 5, 8, 13, 21, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n3, 5, 8, 13, 21, ?","options":["55","35","34","47"],"correct":2,"explanation":"Each term is the sum of the two before it. 13 + 21 = 34.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 13 + 21 = 34."},{"id":9,"question":"Two patterns are interleaved. What comes next?\n2, 40, 9, 37, 16, 34, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n2, 40, 9, 37, 16, 34, ?","options":["23","30","54","16"],"correct":0,"explanation":"Odd positions go 2, 9, 16, ... (+7); even positions go 40, 37, 34, ... (-3). The next term continues the first pattern: 16 + 7 = 23.","explanation_id":"Posisi ganjil: 2, 9, 16, ... (+7); posisi genap: 40, 37, 34, ... (-3). Suku berikutnya melanjutkan pola pertama: 16 + 7 = 23."},{"id":10,"question":"What number comes next in the sequence?\n0, 8, 16, 24, 32, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n0, 8, 16, 24, 32, ?","options":["32","56","40","48"],"correct":2,"explanation":"The sequence changes by a constant difference of 8 each step (arithmetic progression). 32 + (8) = 40.","explanation_id":"Barisan ini berubah dengan selisih tetap 8 di setiap langkah (barisan aritmetika). 32 + (8) = 40."},{"id":11,"question":"Find the value of ? in the grid:\n  ?   10   14\n 10   14   18\n 14   18   22","question_id":"Cari nilai ? dalam tabel berikut:\n  ?   10   14\n 10   14   18\n 14   18   22","options":["8","16","13","6"],"correct":3,"explanation":"Across each row the value rises by 4 per column; down each column it rises by 4 per row. So ? = 6.","explanation_id":"Di setiap baris nilainya naik 4 per kolom; di setiap kolom naik 4 per baris. Maka ? = 6."},{"id":12,"question":"Find the missing number:\n9 : 19  ::  2 : ?","question_id":"Cari angka yang hilang:\n9 : 19  ::  2 : ?","options":["12","9","11","5"],"correct":3,"explanation":"The rule maps n by doubling and adding 1 (2n+1): 9->19. Applying it to 2 gives 5.","explanation_id":"Aturannya mengubah n dengan cara menggandakan lalu tambah 1 (2n+1): 9->19. Diterapkan ke 2 menghasilkan 5."},{"id":13,"question":"What number comes next in the sequence?\n4, 3, 7, 10, 17, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n4, 3, 7, 10, 17, ?","options":["28","44","27","37"],"correct":2,"explanation":"Each term is the sum of the two before it. 10 + 17 = 27.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 10 + 17 = 27."},{"id":14,"question":"What number comes next in the sequence?\n-1, 7, 15, 23, 31, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n-1, 7, 15, 23, 31, ?","options":["31","55","47","39"],"correct":3,"explanation":"The sequence changes by a constant difference of 8 each step (arithmetic progression). 31 + (8) = 39.","explanation_id":"Barisan ini berubah dengan selisih tetap 8 di setiap langkah (barisan aritmetika). 31 + (8) = 39."},{"id":15,"question":"What is 50% of 80?","question_id":"Berapa 50% dari 80?","options":["40","120","88","60"],"correct":0,"explanation":"50% of 80 = 50/100 x 80 = 40.","explanation_id":"50% dari 80 = 50/100 x 80 = 40."},{"id":16,"question":"What number comes next in the sequence?\n20, 11, 2, -7, -16, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n20, 11, 2, -7, -16, ?","options":["-43","-25","-16","-34"],"correct":1,"explanation":"The sequence changes by a constant difference of -9 each step (arithmetic progression). -16 + (-9) = -25.","explanation_id":"Barisan ini berubah dengan selisih tetap -9 di setiap langkah (barisan aritmetika). -16 + (-9) = -25."},{"id":17,"question":"Find the missing number:\n4 : 20  ::  8 : ?","question_id":"Cari angka yang hilang:\n4 : 20  ::  8 : ?","options":["145","136","143","72"],"correct":3,"explanation":"The rule maps n by n x (n+1): 4->20. Applying it to 8 gives 72.","explanation_id":"Aturannya mengubah n dengan cara n x (n+1): 4->20. Diterapkan ke 8 menghasilkan 72."},{"id":18,"question":"What number comes next in the sequence?\n4, 16, 64, 256, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n4, 16, 64, 256, ?","options":["1280","1020","1024","1028"],"correct":2,"explanation":"Each term is multiplied by 4 (geometric progression). 256 x 4 = 1024.","explanation_id":"Setiap suku dikalikan 4 (barisan geometri). 256 x 4 = 1024."},{"id":19,"question":"Which letter comes next?\nB, E, H, K, N, ?","question_id":"Huruf apa berikutnya?\nB, E, H, K, N, ?","options":["O","P","R","Q"],"correct":3,"explanation":"Each letter advances by 3 position(s) in the alphabet. After N, skipping 3, gives Q.","explanation_id":"Setiap huruf maju 3 posisi dalam alfabet. Setelah N, lompat 3, menjadi Q."},{"id":20,"question":"In a certain code, DOG is written as GRJ.\nHow is CODE written in that code?","question_id":"Dalam sebuah kode rahasia, DOG ditulis sebagai GRJ.\nBagaimana CODE ditulis dalam kode itu?","options":["FRGH","GSHI","EQFG","HTIJ"],"correct":0,"explanation":"Each letter shifts forward by 3 position(s) (wrapping Z->A). The same shift on CODE gives FRGH.","explanation_id":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada CODE menghasilkan FRGH."},{"id":21,"question":"What number comes next in the sequence?\n19, 31, 43, 55, 67, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n19, 31, 43, 55, 67, ?","options":["79","67","103","91"],"correct":0,"explanation":"The sequence changes by a constant difference of 12 each step (arithmetic progression). 67 + (12) = 79.","explanation_id":"Barisan ini berubah dengan selisih tetap 12 di setiap langkah (barisan aritmetika). 67 + (12) = 79."},{"id":22,"question":"What is 20% of 250?","question_id":"Berapa 20% dari 250?","options":["50","125","75","150"],"correct":0,"explanation":"20% of 250 = 20/100 x 250 = 50.","explanation_id":"20% dari 250 = 20/100 x 250 = 50."},{"id":23,"question":"In a certain code, FAST is written as KFXY.\nHow is FUNC written in that code?","question_id":"Dalam sebuah kode rahasia, FAST ditulis sebagai KFXY.\nBagaimana FUNC ditulis dalam kode itu?","options":["LATI","MBUJ","JYRG","KZSH"],"correct":3,"explanation":"Each letter shifts forward by 5 position(s) (wrapping Z->A). The same shift on FUNC gives KZSH.","explanation_id":"Setiap huruf digeser maju 5 posisi (memutar Z->A). Geseran yang sama pada FUNC menghasilkan KZSH."},{"id":24,"question":"Which letter comes next?\nL, N, P, R, T, ?","question_id":"Huruf apa berikutnya?\nL, N, P, R, T, ?","options":["U","X","V","W"],"correct":2,"explanation":"Each letter advances by 2 position(s) in the alphabet. After T, skipping 2, gives V.","explanation_id":"Setiap huruf maju 2 posisi dalam alfabet. Setelah T, lompat 2, menjadi V."},{"id":25,"question":"Find the missing number:\n7 : 56  ::  6 : ?","question_id":"Cari angka yang hilang:\n7 : 56  ::  6 : ?","options":["83","42","85","78"],"correct":1,"explanation":"The rule maps n by n x (n+1): 7->56. Applying it to 6 gives 42.","explanation_id":"Aturannya mengubah n dengan cara n x (n+1): 7->56. Diterapkan ke 6 menghasilkan 42."},{"id":26,"question":"A value of 120 is increased by 25%. What is the new value?","question_id":"Nilai 120 dinaikkan sebesar 25%. Berapa nilai barunya?","options":["270","330","150","240"],"correct":2,"explanation":"25% of 120 is 30. Increased: 120 + 30 = 150.","explanation_id":"25% dari 120 adalah 30. Dinaikkan: 120 + 30 = 150."},{"id":27,"question":"What is the average (mean) of these numbers?\n9, 37, 14, 23, 12","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n9, 37, 14, 23, 12","options":["28","56","114","19"],"correct":3,"explanation":"Mean = sum / count = 95 / 5 = 19.","explanation_id":"Rata-rata = jumlah / banyaknya = 95 / 5 = 19."},{"id":28,"question":"What number comes next in the sequence?\n3, 6, 9, 15, 24, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n3, 6, 9, 15, 24, ?","options":["63","40","39","54"],"correct":2,"explanation":"Each term is the sum of the two before it. 15 + 24 = 39.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 15 + 24 = 39."},{"id":29,"question":"What number comes next in the sequence?\n6, 17, 28, 39, 50, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n6, 17, 28, 39, 50, ?","options":["83","72","61","50"],"correct":2,"explanation":"The sequence changes by a constant difference of 11 each step (arithmetic progression). 50 + (11) = 61.","explanation_id":"Barisan ini berubah dengan selisih tetap 11 di setiap langkah (barisan aritmetika). 50 + (11) = 61."},{"id":30,"question":"What number comes next in the sequence?\n7, 18, 29, 40, 51, ?","question_id":"Angka berapa yang muncul berikutnya dalam , 4, 6, ... (+2); posisi genap: 27, 30, 33, ... (+3). Suku berikutnya melanjutkan pola pertama: 6 + 2 = 8."},{"id":45,"question":"Complete the analogy:\nS : R  ::  E : ?","question_id":"Lengkapi analoginya:\nS : R  ::  E : ?","options":["E","D","F","C"],"correct":1,"explanation":"S maps to R by moving 1 position(s) backward in the alphabet. The same move on E gives D.","explanation_id":"S menjadi R dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada E menghasilkan D."},{"id":46,"question":"What number comes next in the sequence?\n21, 16, 11, 6, 1, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n21, 16, 11, 6, 1, ?","options":["1","-4","-14","-9"],"correct":1,"explanation":"The sequence changes by a constant difference of -5 each step (arithmetic progression). 1 + (-5) = -4.","explanation_id":"Barisan ini berubah dengan selisih tetap -5 di setiap langkah (barisan aritmetika). 1 + (-5) = -4."},{"id":47,"question":"Find the missing number:\n6 : 18  ::  2 : ?","question_id":"Cari angka yang hilang:\n6 : 18  ::  2 : ?","options":["10","13","11","6"],"correct":3,"explanation":"The rule maps n by tripling it (3n): 6->18. Applying it to 2 gives 6.","explanation_id":"Aturannya mengubah n dengan cara mengalikan tiga (3n): 6->18. Diterapkan ke 2 menghasilkan 6."},{"id":48,"question":"Find the missing number:\n5 : 11  ::  7 : ?","question_id":"Cari angka yang hilang:\n5 : 11  ::  7 : ?","options":["31","29","15","64"],"correct":2,"explanation":"The rule maps n by doubling and adding 1 (2n+1): 5->11. Applying it to 7 gives 15.","explanation_id":"Aturannya mengubah n dengan cara menggandakan lalu tambah 1 (2n+1): 5->11. Diterapkan ke 7 menghasilkan 15."},{"id":49,"question":"Find the missing number (?):\n4, ?, 14, 19, 24, 29","question_id":"Cari angka yang hilang (?):\n4, ?, 14, 19, 24, 29","options":["19","9","23","13"],"correct":1,"explanation":"The sequence rises by 5 each step. The term before ? is 4, so ? = 4+5 = 9.","explanation_id":"B ":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada SWIFT menghasilkan VZLIW."},{"id":197,"question":"Two patterns are interleaved. What comes next?\n10, 36, 13, 32, 16, 28, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n10, 36, 13, 32, 16, 28, ?","options":["43","22","16","19"],"correct":3,"explanation":"Odd positions go 10, 13, 16, ... (+3); even positions go 36, 32, 28, ... (-4). The next term continues the first pattern: 16 + 3 = 19.","explanation_id":"Posisi ganjil: 10, 13, 16, ... (+3); posisi genap: 36, 32, 28, ... (-4). Suku berikutnya melanjutkan pola pertama: 16 + 3 = 19."},{"id":198,"question":"A value of 80 is decreased by 10%. What is the new value?","question_id":"Nilai 80 diturunkan sebesar 10%. Berapa nilai barunya?","options":["152","143","160","72"],"correct":3,"explanation":"10% of 80 is 8. Decreased: 80 - 8 = 72.","explanation_id":"10% dari 80 adalah 8. Diturunkan: 80 - 8 = 72."},{"id":199,"question":"Find the missing number:\n3 : 8  ::  7 : ?","question_id":"Cari angka yang hilang:\n3 : 8  ::  7 : ?","options":["95","103","48","97"],"correct":2,"explanation":"The rule maps n by n^2 - 1: 3->8. Applying it to 7 gives 48.","explanation_id":"Aturannya mengubah n dengan cara n^2 - 1: 3->8. Diterapkan ke 7 menghasilkan 48."},{"id":200,"question":"Find the missing number:\n9 : 81  ::  3 : ?","question_id":"Cari angka yang hilang:\n9 : 81  ::  3 : ?","options":["19","18","17","9"],"correct":3,"explanation":"The rule maps n by squaring it (n^2): 9->81. Applying it to 3 gives 9.","explanation_id":"Aturannya mengubah n dengan cara mengkuadratkannya (n^2): 9->81. Diterapkan ke 3 menghasilkan 9."},{"id":201,"question":"What number comes next?\n6, 10, 15, 21, 28, ?","question_id":"Angka berapa berikutnya?\n6, 10, 15, 21, 28, ?","options":["36","64","45","35"],"correct":0,"explanation":"These are triangular numbers (1+2+...+n). The gaps grow by 1 each step, making the next term 36.","explanation_id":"Ini bilangan segitiga (1+2+...+n). Selisihnya bertambah 1 tiap langkah, sehingga suku berikutnya 36."},{"id":202,"question":"In a certain code, SUN is written as RTM.\nHow is MOON written in that code?","question_id":"Dalam sebuah kode rahasia, SUN ditulis sebagai RTM.\nBagaimana MOON ditulis dalam kode itu?","options":["MOON","NPPO","LNNM","KMML"],"correct":2,"explanation":"Each letter shifts forward by 25 position(s) (wrapping Z->A). The same shift on MOON gives LNNM.","explanation_id":"Setiap huruf digeser maju 25 posisi (memutar Z->A). Geseran yang sama pada MOON menghasilkan LNNM."},{"id":203,"question":"Which one does NOT belong with the others?\n8, 18, 11, 6","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n8, 18, 11, 6","options":["18","11","6","8"],"correct":1,"explanation":"11 is the only odd number; the rest are even.","explanation_id":"11 satu-satunya bilangan ganjil; sisanya genap."},{"id":204,"question":"Find the missing number (?):\n8, 17, 26, 35, ?, 53","question_id":"Cari angka yang hilang (?):\n8, 17, 26, 35, ?, 53","options":["89","79","97","44"],"correct":3,"explanation":"The sequence rises by 9 each step. The term before ? is 35, so ? = 35+9 = 44.","explanation_id":"Barisan naik 9 tiap langkah. Suku sebelum ? adalah 35, jadi ? = 35+9 = 44."},{"id":205,"question":"What number comes next in the sequence?\n18, 14, 10, 6, 2, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n18, 14, 10, 6, 2, ?","options":["-6","-2","2","-10"],"correct":1,"explanation":"The sequence changes by a constant difference of -4 each step (arithmetic progression). 2 + (-4) = -2.","explanation_id":"Barisan ini berubah dengan selisih tetap -4 di setiap langkah (barisan aritmetika). 2 + (-4) = -2."},{"id":206,"question":"What number comes next in the sequence?\n15, 9, 3, -3, -9, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n15, 9, 3, -3, -9, ?","options":["-21","-27","-9","-15"],"correct":3,"explanation":"The sequence changes by a constant difference of -6 each step (arithmetic progression). -9 + (-6) = -15.","explanation_id":"Barisan ini berubah dengan selisih tetap -6 di setiap langkah (barisan aritmetika). -9 + (-6) = -15."},{"id":207,"question":"Complete the analogy:\nO : Q  ::  M : ?","question_id":"Lengkapi analoginya:\nO : Q  ::  M : ?","options":["K","P","N","O"],"correct":3,"explanation":"O maps to Q by moving 2 position(s) forward in the alphabet. The same move on M gives O.","explanation_id":"O menjadi Q dengan bergeser 2 posisi maju dalam alfabet. Geseran sama pada M menghasilkan O."},{"id":208,"question":"What is 30% of 500?","question_id":"Berapa 30% dari 500?","options":["450","350","225","150"],"correct":3,"explanation":"30% of 500 = 30/100 x 500 = 150.","explanation_id":"30% dari 500 = 30/100 x 500 = 150."},{"id":209,"question":"What is the average (mean) of these numbers?\n4, 32, 3","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n4, 32, 3","options":["13","52","16","45"],"correct":0,"explanation":"Mean = sum / count = 39 / 3 = 13.","explanation_id":"Rata-rata = jumlah / banyaknya = 39 / 3 = 13."},{"id":210,"question":"Find the missing number (?):\n18, 25, 32, 39, ?, 53","question_id":"Cari angka yang hilang (?):\n18, 25, 32, 39, ?, 53","options":["93","99","46","85"],"correct":2,"explanation":"The sequence rises by 7 each step. The term before ? is 39, so ? = 39+7 = 46.","explanation_id":"Barisan naik 7 tiap langkah. Suku sebelum ? adalah 39, jadi ? = 39+7 = 46."},{"id":211,"question":"In a certain code, BYTE is written as AXSD.\nHow is PLAY written in that code?","question_id":"Dalam sebuah kode rahasia, BYTE ditulis sebagai AXSD.\nBagaimana PLAY ditulis dalam kode itu?","options":["QMBZ","NJYW","PLAY","OKZX"],"correct":3,"explanation":"Each letter shifts forward by 25 position(s) (wrapping Z->A). The same shift on PLAY gives OKZX.","explanation_id":"Setiap huruf digeser maju 25 posisi (memutar Z->A). Geseran yang sama pada PLAY menghasilkan O  in that code?","question_id":"Dalam sebuah kode rahasia, APPLE ditulis sebagai CRRNG.\nBagaimana CODE ditulis dalam kode itu?","options":["GSHI","DPEF","FRGH","EQFG"],"correct":3,"explanation":"Each letter shifts forward by 2 position(s) (wrapping Z->A). The same shift on CODE gives EQFG.","explanation_id":"Setiap huruf digeser maju 2 posisi (memutar Z->A). Geseran yang sama pada CODE menghasilkan EQFG."},{"id":218,"question":"Find the missing number:\n9 : 81  ::  5 : ?","question_id":"Cari angka yang hilang:\n9 : 81  ::  5 : ?","options":["25","49","50","51"],"correct":0,"explanation":"The rule maps n by squaring it (n^2): 9->81. Applying it to 5 gives 25.","explanation_id":"Aturannya mengubah n dengan cara mengkuadratkannya (n^2): 9->81. Diterapkan ke 5 menghasilkan 25."},{"id":219,"question":"What is 60% of 200?","question_id":"Berapa 60% dari 200?","options":["260","360","120","180"],"correct":2,"explanation":"60% of 200 = 60/100 x 200 = 120.","explanation_id":"60% dari 200 = 60/100 x 200 = 120."},{"id":220,"question":"Find the value of ? in the grid:\n  ?    5    7\n  8   10   12\n 13   15   17","question_id":"Cari nilai ? dalam tabel berikut:\n  ?    5    7\n  8   10   12\n 13   15   17","options":["11","8","3","4"],"correct":2,"explanation":"Across each row the value rises by 2 per column; down each column it rises by 5 per row. So ? = 3.","explanation_id":"Di setiap baris nilainya naik 2 per kolom; di setiap kolom naik 5 per baris. Maka ? = 3."},{"id":221,"question":"In a certain code, CAT is written as BZS.\nHow is BYTE written in that code?","question_id":"Dalam sebuah kode rahasia, CAT ditulis sebagai BZS.\nBagaimana BYTE ditulis dalam kode itu?","options":["AXSD","ZWRC","CZUF","BYTE"],"correct":0,"explanation":"Each letter shifts forward by 25 position(s) (wrapping Z->A). The same shift on BYTE gives AXSD.","explanation_id":"Setiap huruf digeser maju 25 posisi (memutar Z->A). Geseran yang sama pada BYTE menghasilkan AXSD."},{"id":222,"question":"What is tion_id":"Cari angka yang hilang (?):\n11, 18, 25, 32, ?, 46","options":["39","85","79","71"],"correct":0,"explanation":"The sequence rises by 7 each step. The term before ? is 32, so ? = 32+7 = 39.","explanation_id":"Barisan naik 7 tiap langkah. Suku sebelum ? adalah 32, jadi ? = 32+7 = 39."},{"id":238,"question":"In a certain code, CLASS is written as BKZRR.\nHow is CODE written in that code?","question_id":"Dalam sebuah kode rahasia, CLASS ditulis sebagai BKZRR.\nBagaimana CODE ditulis dalam kode itu?","options":["AMBC","CODE","DPEF","BNCD"],"correct":3,"explanation":"Each letter shifts forward by 25 position(s) (wrapping Z->A). The same shift on CODE gives BNCD.","explanation_id":"Setiap huruf digeser maju 25 posisi (memutar Z->A). Geseran yang sama pada CODE menghasilkan BNCD."},{"id":239,"question":"Which one does NOT belong with the others?\n13, 8, 7, 11","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n13, 8, 7, 11","options":["7","8","11","13"],"correct":1,"explanation":"8 is the only composite number; the others (7, 11, 13) are prime.","explanation_id":"8 adalah satu-satunya bilangan komposit; sisanya (7, 11, 13) bilangan prima."},{"id":240,"question":"Find the value of ? in the grid:\n  6    ?    8\n 10   11   12\n 14   15   16","question_id":"Cari nilai ? dalam tabel berikut:\n  6    ?    8\n 10   11   12\n 14   15   16","options":["15","18","7","13"],"correct":2,"explanation":"Across each row the value rises by 1 per column; down each column it rises by 4 per row. So ? = 7.","explanation_id":"Di setiap baris nilainya naik 1 per kolom; di setiap kolom naik 4 per baris. Maka ? = 7."},{"id":241,"question":"Which one does NOT belong with the others?\n3, 4, 9, 25","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n3, 4, 9, 25","options":["4","25","3","9"],"correct":2,"explanation":"3 is the only number that is not a perfect square; 4, 9, 25 are squares (1^2,2^2,3^2...).","explanation_id":"3 satu-satunya yang bukan bilangan kuadrat sempurna; 4, 9, 25 adalah kuadrat (1^2,2^2,3^2...)."},{"id":242,"question":"In a certain code, BOOK is written as CPPL.\nHow is CLASS written in that code?","question_id":"Dalam sebuah kode rahasia, BOOK ditulis sebagai CPPL.\nBagaimana CLASS ditulis dalam kode itu?","options":["ENCUU","DMBTT","FODVV","CLASS"],"correct":1,"explanation":"Each letter shifts forward by 1 position(s) (wrapping Z->A). The same shift on CLASS gives DMBTT.","explanation_id":"Setiap huruf digeser maju 1 posisi (memutar Z->A). Geseran yang sama pada CLASS menghasilkan DMBTT."},{"id":243,"question":"All squares are rectangles.\nAll rectangles are shapes.\nWhich conclusion must be true?","question_id":"Semua persegi adalah persegi panjang.\nSemua persegi panjang adalah bangun datar.\nKesimpulan mana yang pasti benar?","options":["All shapes are squares.","Some shapes are not squares.","All squares are shapes.","No squares are shapes."],"correct":2,"explanation":"If every member of squares is in rectangles, and every member of rectangles is in shapes, then every member of squares is in shapes (transitive). The reverse ('all shapes are squares') does not follow.","explanation_id":"Jika setiap persegi termasuk persegi panjang, dan setiap persegi panjang termasuk bangun datar, maka setiap persegi pasti termasuk bangun datar (sifat transitif). Kebalikannya ('semua bangun datar adalah persegi') tidak otomatis benar.","options_id":["Semua bangun datar adalah persegi.","Sebagian bangun datar bukan persegi.","Semua persegi adalah bangun datar.","Tidak ada persegi yang termasuk bangun datar."]},{"id":244,"question":"Complete the analogy:\nQ : P  ::  O : ?","question_id":"Lengkapi analoginya:\nQ : P  ::  O : ?","options":["N","P","O","M"],"correct":0,"explanation":"Q maps to P by moving 1 position(s) backward in the alphabet. The same move on O gives N.","explanation_id":"Q menjadi P dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada O menghasilkan N."},{"id":245,"question":"What number comes next in the sequence?\n28, 39, 50, 61, 72, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n28, 39, 50, 61, 72, ?","options":["72","83","94","105"],"correct":1,"explanation":"The sequence changes by a constant difference of 11 each step (arithmetic progression). 72 + (11) = 83.","explanation_id":"Barisan ini berubah dengan selisih tetap 11 di setiap langkah (barisan aritmetika). 72 + (11) = 83."},{"id":246,"question":"What number comes next?\n1, 8, 27, 64, ?","question_id":"Angka berapa berikutnya?\n1, 8, 27, 64, ?","options":["130","150","189","125"],"correct":3,"explanation":"These are perfect cubes (n^3). 5^3 = 125.","explanation_id":"Ini bilangan pangkat tiga (n^3). 5^3 = 125."},{"id":247,"question":"Find the missing number:\n2 : 6  ::  8 : ?","question_id":"Cari angka yang hilang:\n2 : 6  ::  8 : ?","options":["143","145","136","72"],"correct":3,"explanation":"The rule maps n by n x (n+1): 2->6. Applying it to 8 gives 72.","explanation_id":"Aturannya mengubah n dengan cara n x (n+1): 2->6. Diterapkan ke 8 menghasilkan 72."},{"id":248,"question":"A value of 50 is increased by 10%. What is the new value?","question_id":"Nilai 50 dinaikkan sebesar 10%. Berapa nilai barunya?","options":["105","100","55","115"],"correct":2,"explanation":"10% of 50 is 5. Increased: 50 + 5 = 55.","explanation_id":"10% dari 50 adalah 5. Dinaikkan: 50 + 5 = 55."},{"id":249,"question":"What is 5% of 200?","question_id":"Berapa 5% dari 200?","options":["15","40","10","30"],"correct":2,"explanation":"5% of 200 = 5/100 x 200 = 10.","explanation_id":"5% dari 200 = 5/100 x 200 = 10."},{"id":250,"question":"Find the value of ? in the grid:\n  ?    7   11\n  8   12   16\n 13   17   21","question_id":"Cari nilai ? dalam tabel berikut:\n  ?    7   11\n  8   12   16\n 13   17   21","options":["10","2","11","3"],"correct":3,"explanation":"Across each row the value rises by 4 per column; down each column it rises by 5 per row. So ? = 3.","explanation_id":"Di setiap baris nilainya naik 4 per kolom; di setiap kolom naik 5 per baris. Maka ? = 3."},{"id":251,"question":"Which letter comes next?\nB, C, D, E, F, ?","question_id":"Huruf apa berikutnya?\nB, C, D, E, F, ?","options":["H","G","F","G "],"correct":1,"explanation":"Each letter advances by 1 position(s) in the alphabet. After F, skipping 1, gives G.","explanation_id":"Setiap huruf maju 1 posisi dalam alfabet. Setelah F, lompat 1, menjadi G."},{"id":252,"question":"Which letter comes next?\nF, H, J, L, N, ?","question_id":"Huruf apa berikutnya?\nF, H, J, L, N, ?","options":["P","O","Q","R"],"correct":0,"explanation":"Each letter advances by 2 position(s) in the alphabet. After N, skipping 2, gives P.","explanation_id":"Setiap huruf maju 2 posisi dalam alfabet. Setelah N, lompat 2, menjadi P."},{"id":253,"question":"Find the value of ? in the grid:\n  9   11   13\n 14    ?   18\n 19   21   23","question_id":"Cari nilai ? dalam tabel berikut:\n  9   11   13\n 14    ?   18\n 19   21   23","options":["16","34","37","30"],"correct":0,"explanation":"Across each row the value rises by 2 per column; down each column it rises by 5 per row. So ? = 16.","explanation_id":"Di setiap baris nilainya naik 2 per kolom; di setiap kolom naik 5 per baris. Maka ? = 16."},{"id":254,"question":"What number comes next in the sequence?\n9, 20, 31, 42, 53, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n9, 20, 31, 42, 53, ?","options":["75","64","86","53"],"correct":1,"explanation":"The sequence changes by a constant difference of 11 each step (arithmetic progression). 53 + (11) = 64.","explanation_id":"Barisan ini berubah dengan selisih tetap 11 di setiap langkah (barisan aritmetika). 53 + (11) = 64."},{"id":255,"question":"Two patterns are interleaved. What comes next?\n11, 25, 18, 27, 25, 29, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n11, 25, 18, 27, 25, 29, ?","options":["63","39","25","32"],"correct":3,"explanation":"Odd positions go 11, 18, uf digeser maju 1 posisi (memutar Z->A). Geseran yang sama pada FUNC menghasilkan GVOD."},{"id":509,"question":"What is 10% of 20?","question_id":"Berapa 10% dari 20?","options":["2","3","20","6"],"correct":0,"explanation":"10% of 20 = 10/100 x 20 = 2.","explanation_id":"10% dari 20 = 10/100 x 20 = 2."},{"id":510,"question":"Find the missing number:\n5 : 24  ::  7 : ?","question_id":"Cari angka yang hilang:\n5 : 24  ::  7 : ?","options":["95","103","97","48"],"correct":3,"explanation":"The rule maps n by n^2 - 1: 5->24. Applying it to 7 gives 48.","explanation_id":"Aturannya mengubah n dengan cara n^2 - 1: 5->24. Diterapkan ke 7 menghasilkan 48."},{"id":511,"question":"What number comes next in the sequence?\n10, 3, -4, -11, -18, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n10, 3, -4, -11, -18, ?","options":["-25","-32","-18","-39"],"correct":0,"explanation":"The sequence changes by a constant difference of -7 each step (arithmetic progression). -18 + (-7) = -25.","explanation_id":"Barisan ini berubah dengan selisih tetap -7 di setiap langkah (barisan aritmetika). -18 + (-7) = -25."},{"id":512,"question":"In a certain code, FISH is written as DGQF.\nHow is GAME written in that code?","question_id":"Dalam sebuah kode rahasia, FISH ditulis sebagai DGQF.\nBagaimana GAME ditulis dalam kode itu?","options":["DXJB","EYKC","GAME","FZLD"],"correct":1,"explanation":"Each letter shifts forward by 24 position(s) (wrapping Z->A). The same shift on GAME gives EYKC.","explanation_id":"Setiap huruf digeser maju 24 posisi (memutar Z->A). Geseran yang sama pada GAME menghasilkan EYKC."},{"id":513,"question":"Find the missing number (?):\n18, 27, 36, 45, ?, 63","question_id":"Cari angka yang hilang (?):\n18, 27, 36, 45, ?, 63","options":["117","109","54","99"],"correct":2,"explanation":"The sequence rises by 9 each step. The term before ? is 45, so ? = 45+9 = 54.","explanation_id":"Barisan naik 9 tiap langkah. Suku sebelum ? adalah 45, jadi ? = 45+9 = 54."},{"id":514,"question":"Find the value of ? in the grid:\n  1    2    3\n  6    7    8\n 11    ?   13","question_id":"Cari nilai ? dalam tabel berikut:\n  1    2    3\n  6    7    8\n 11    ?   13","options":["29","25","12","23"],"correct":2,"explanation":"Across each row the value rises by 1 per column; down each column it rises by 5 per row. So ? = 12.","explanation_id":"Di setiap baris nilainya naik 1 per kolom; di setiap kolom naik 5 per baris. Maka ? = 12."},{"id":515,"question":"What number comes next in the sequence?\n14, 23, 32, 41, 50, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n14, 23, 32, 41, 50, ?","options":["77","50","59","68"],"correct":2,"explanation":"The sequence changes by a constant difference of 9 each step (arithmetic progression). 50 + (9) = 59.","explanation_id":"Barisan ini berubah dengan selisih tetap 9 di setiap langkah (barisan aritmetika). 50 + (9) = 59."},{"id":516,"question":"Find the value of ? in the grid:\n 10   13   16\n 15    ?   21\n 20   23   26","question_id":"Cari nilai ? dalam tabel berikut:\n 10   13   16\n 15    ?   21\n 20   23   26","options":["41","18","39","33"],"correct":1,"explanation":"Across each row the value rises by 3 per column; down each column it rises by 5 per row. So ? = 18.","explanation_id":"Di setiap baris nilainya naik 3 per kolom; di setiap kolom naik 5 per baris. Maka ? = 18."},{"id":517,"question":"Two patterns are interleaved. What comes next?\n3, 35, 8, 30, 13, 25, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n3, 35, 8, 30, 13, 25, ?","options":["23","18","38","13"],"correct":1,"explanation":"Odd positions go 3, 8, 13, ... (+5); even positions go 35, 30, 25, ... (-5). The next term continues the first pattern: 13 + 5 = 18.","explanation_id":"Posisi ganjil: 3, 8, 13, ... (+5); posisi genap: 35, 30, 25, ... (-5). Suku berikutnya melanjutkan pola pertama: 13 + 5 = 18."},{"id":518,"question":"A value of 300 is increased by 50%. What is the new value?","question_id":"Nilai 300 dinaikkan sebesar 50%. Berapa nilai barunya?","options":["600","750","1050","450"],"correct":3,"explanation":"50% of 300 is 150. Increased: 300 + 150 = 450.","explanation_id":"50% dari 300 adalah 150. Dinaikkan: 300 + 150 = 450."},{"id":519,"question":"What is 25% of 60?","question_id":"Berapa 25% dari 60?","options":["31","36","15","45"],"correct":2,"explanation":"25% of 60 = 25/100 x 60 = 15.","explanation_id":"25% dari 60 = 25/100 x 60 = 15."},{"id":520,"question":"What number comes next in the sequence?\n3, -1, -5, -9, -13, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n3, -1, -5, -9, -13, ?","options":["-13","-25","-21","-17"],"correct":3,"explanation":"The sequence changes by a constant difference of -4 each step (arithmetic progression). -13 + (-4) = -17.","explanation_id":"Barisan ini berubah dengan selisih tetap -4 di setiap langkah (barisan aritmetika). -13 + (-4) = -17."},{"id":521,"question":"Two patterns are interleaved. What comes next?\n1, 22, 6, 24, 11, 26, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n1, 22, 6, 24, 11, 26, ?","options":["44","11","16","21"],"correct":2,"explanation":"Odd positions go 1, 6, 11, ... (+5); even positions go 22, 24, 26, ... (+2). The next term continues the first pattern: 11 + 5 = 16.","explanation_id":"Posisi ganjil: 1, 6, 11, ... (+5); posisi genap: 22, 24, 26, ... (+2). Suku berikutnya melanjutkan pola pertama: 11 + 5 = 16."},{"id":522,"question":"What number comes next in the sequence?\n-1, 12, 25, 38, 51, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n-1, 12, 25, 38, 51, ?","options":["64","51","90","77"],"correct":0,"explanation":"The sequence changes by a constant difference of 13 each step (arithmetic progression). 51 + (13) = 64.","explanation_id":"Barisan ini berubah dengan selisih tetap 13 di setiap langkah (barisan aritmetika). 51 + (13) = 64."},{"id":523,"question":"What number comes next in the sequence?\n6, 8, 10, 12, 14, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n6, 8, 10, 12, 14, ?","options":["14","18","20","16"],"correct":3,"explanation":"The sequence changes by a constant difference of 2 each step (arithmetic progression). 14 + (2) = 16.","explanation_id":"Barisan ini berubah dengan selisih tetap 2 di setiap langkah (barisan aritmetika). 14 + (2) = 16."},{"id":524,"question":"What number comes next?\n4, 7, 12, 19, 28, ?","question_id":"Angka berapa berikutnya?\n4, 7, 12, 19, 28, ?","options":["67","38","45","39"],"correct":3,"explanation":"These are perfect squares (n^2) shifted by +3: 1^2,2^2,3^2... The 6th term is 6^2+3 = 39.","explanation_id":"Ini bilangan kuadrat sempurna (n^2) digeser +3: 1^2,2^2,3^2... Suku ke-6 adalah 6^2+3 = 39."},{"id":525,"question":"Which letter comes next?\nI, L, O, R, U, ?","question_id":"Huruf apa berikutnya?\nI, L, O, R, U, ?","options":["X","W","V","Y"],"correct":0,"explanation":"Each letter advances by 3 position(s) in the alphabet. After U, skipping 3, gives X.","explanation_id":"Setiap huruf maju 3 posisi dalam alfabet. Setelah U, lompat 3, menjadi X."},{"id":526,"question":"In a certain code, HEAP is written as LIET.\nHow is HASH written in that code?","question_id":"Dalam sebuah kode rahasia, HEAP ditulis sebagai LIET.\nBagaimana HASH ditulis dalam kode itu?","options":["NGYN","MFXM","KDVK","LEWL"],"correct":3,"explanation":"Each letter shifts forward by 4 position(s) (wrapping Z->A). The same shift on HASH gives LEWL.","explanation_id":"Setiap huruf digeser maju 4 posisi (memutar Z->A). Geseran yang sama pada HASH menghasilkan LEWL."},{"id":527,"question":"What number comes next in the sequence?\n30, 34, 38, 42, 46, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n30, 34, 38, 42, 46, ?","options":["50","58","46","54"],"correct":0,"explanation":"The sequence changes by a constant difference of 4 each step (arithmetic progression). 46 + (4) = 50.","explanation_id":"Barisan ini berubah dengan selisih tetap 4 di setiap langkah (barisan aritmetika). 46 + (4) = 50."},{"id":528,"question":"What is the average (mean) of these numbers?\n38, 2, 14, 30","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n38, 2, 14, 30","options":["23","21","59","105"],"correct":1,"explanation":"Mean = sum / count = 84 / 4 = 21.","explanation_id":"Rata-rata = jumlah / banyaknya = 84 / 4 = 21."},{"id":529,"question":"Which one does NOT belong with the others?\n100, 16, 36, 12","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n100, 16, 36, 12","options":["100","36","12","16"],"correct":2,"explanation":"12 is the only number that is not a perfect square; 16, 36, 100 are squares (1^2,2^2,3^2...).","explanation_id":"12 satu-satunya yang bukan bilangan kuadrat sempurna; 16, 36, 100 adalah kuadrat (1^2,2^2,3^2...)."},{"id":530,"question":"Which letter comes next?\nJ, L, N, P, R, ?","question_id":"Huruf apa berikutnya?\nJ, L, N, P, R, ?","options":["S","T","U","V"],"correct":1,"explanation":"Each letter advances by 2 position(s) in the alphabet. After R, skipping 2, gives T.","explanation_id":"Setiap huruf maju 2 posisi dalam alfabet. Setelah R, lompat 2, menjadi T."},{"id":531,"question":"Which one does NOT belong with the others?\n29, 13, 11, 8","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n29, 13, 11, 8","options":["8","13","29","11"],"correct":0,"explanation":"8 is the only composite number; the others (11, 13, 29) are prime.","explanation_id":"8 adalah satu-satunya bilangan komposit; sisanya (11, 13, 29) bilangan prima."},{"id":532,"question":"Complete the analogy:\nP : N  ::  O : ?","question_id":"Lengkapi analoginya:\nP : N  ::  O : ?","options":["L","Q","N","M"],"correct":3,"explanation":"P maps to N by moving 2 position(s) backward in the alphabet. The same move on O gives M.","explanation_id":"P menjadi N dengan bergeser 2 posisi mundur dalam alfabet. Geseran sama pada O menghasilkan M."},{"i .","explanation_id":"Barisan ini berubah dengan selisih tetap 8 di setiap langkah (barisan aritmetika). 39 + (8) = 47."},{"id":548,"question":"Two patterns are interleaved. What comes next?\n3, 23, 9, 20, 15, 17, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n3, 23, 9, 20, 15, 17, ?","options":["21","35","27","15"],"correct":0,"explanation":"Odd positions go 3, 9, 15, ... (+6); even positions go 23, 20, 17, ... (-3). The next term continues the first pattern: 15 + 6 = 21.","explanation_id":"Posisi ganjil: 3, 9, 15, ... (+6); posisi genap: 23, 20, 17, ... (-3). Suku berikutnya melanjutkan pola pertama: 15 + 6 = 21."},{"id":549,"question":"Find the missing number:\n6 : 72  ::  4 : ?","question_id":"Cari angka yang hilang:\n6 : 72  ::  4 : ?","options":["32","65","48","63"],"correct":0,"explanation":"The rule maps n by 2n^2: 6->72. Applying it to 4 gives 32.","explanation_id":"Aturannya mengubah n dengan cara 2n^2: 6->72. Diterapkan ke 4 menghasilkan 32."},{"id":550,"question":"Complete the analogy:\nM : K  ::  D : ?","question_id":"Lengkapi analoginya:\nM : K  ::  D : ?","options":["F","C","A","B"],"correct":3,"explanation":"M maps to K by moving 2 position(s) backward in the alphabet. The same move on D gives B.","explanation_id":"M menjadi K dengan bergeser 2 posisi mundur dalam alfabet. Geseran sama pada D menghasilkan B."},{"id":551,"question":"Two patterns are interleaved. What comes next?\n1, 40, 8, 37, 15, 34, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n1, 40, 8, 37, 15, 34, ?","options":["29","15","53","22"],"correct":3,"explanation":"Odd positions go 1, 8, 15, ... (+7); even positions go 40, 37, 34, ... (-3). The next term continues the first pattern: 15 + 7 = 22.","explanation_id":"Posisi ganjil: 1, 8, 15, ... (+7); posisi genap: 40, 37, 34, ... (-3). Suku berikutnya melanjutkan pola pertama: 15 + 7 = 22."},{"id":552,"question":"What number comes next in the sequence?\n5, 15, 45, 135, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n5, 15, 45, 135, ?","options":["402","405","540","408"],"correct":1,"explanation":"Each term is multiplied by 3 (geometric progression). 135 x 3 = 405.","explanation_id":"Setiap suku dikalikan 3 (barisan geometri). 135 x 3 = 405."},{"id":553,"question":"What number comes next in the sequence?\n2, 0, -2, -4, -6, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n2, 0, -2, -4, -6, ?","options":["-12","-6","-10","-8"],"correct":3,"explanation":"The sequence changes by a constant difference of -2 each step (arithmetic progression). -6 + (-2) = -8.","explanation_id":"Barisan ini berubah dengan selisih tetap -2 di setiap langkah (barisan aritmetika). -6 + (-2) = -8."},{"id":554,"question":"What number comes next in the sequence?\n9, 4, 13, 17, 30, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n9, 4, 13, 17, 30, ?","options":["47","48","77","64"],"correct":0,"explanation":"Each term is the sum of the two before it. 17 + 30 = 47.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 17 + 30 = 47."},{"id":555,"question":"A value of 200 is decreased by 50%. What is the new value?","question_id":"Nilai 200 diturunkan sebesar 50%. Berapa nilai barunya?","options":["100","199","400","300"],"correct":0,"explanation":"50% of 200 is 100. Decreased: 200 - 100 = 100.","explanation_id":"50% dari 200 adalah 100. Diturunkan: 200 - 100 = 100."},{"id":556,"question":"Which letter comes next?\nA, D, G, J, M, ?","question_id":"Huruf apa berikutnya?\nA, D, G, J, M, ?","options":["N","P","Q","O"],"correct":1,"explanation":"Each letter advances by 3 position(s) in the alphabet. After M, skipping 3, gives P.","explanation_id":"Setiap huruf maju 3 posisi dalam alfabet. Setelah M, lompat 3, menjadi P."},{"id":557,"question":"What number comes next in the sequence?\n6, 18, 30, 42, 54, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n6, 18, 30, 42, 54, ?","options":["66","78","90","54"],"correct":0,"explanation":"The sequence changes by a constant difference of 12 each step (arithmetic progression). 54 + (12) = 66.","explanation_id":"Barisan ini berubah dengan selisih tetap 12 di setiap langkah (barisan aritmetika). 54 + (12) = 66."},{"id":558,"question":"What number comes next in the sequence?\n-9, -12, -15, -18, -21, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n-9, -12, -15, -18, -21, ?","options":["-27","-24","-30","-21"],"correct":1,"explanation":"The sequence changes by a constant difference of -3 each step (arithmetic progression). -21 + (-3) = -24.","explanation_id":"Barisan ini berubah dengan selisih tetap -3 di setiap langkah (barisan aritmetika). -21 + (-3) = -24."},{"id":559,"question":"Find the missing number:\n5 : 15  ::  3 : ?","question_id":"Cari angka yang hilang:\n5 : 15  ::  3 : ?","options":["18","19","17","9"],"correct":3,"explanation":"The rule maps n by tripling it (3n): 5->15. Applying it to 3 gives 9.","explanation_id":"Aturannya mengubah n dengan cara mengalikan tiga (3n): 5->15. Diterapkan ke 3 menghasilkan 9."},{"id":560,"question":"Which one does NOT belong with the others?\n4, 7, 16, 100","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n4, 7, 16, 100","options":["4","7","100","16"],"correct":1,"explanation":"7 is the only number that is not a perfect square; 4, 16, 100 are squares (1^2,2^2,3^2...).","explanation_id":"7 satu-satunya yang bukan bilangan kuadrat sempurna; 4, 16, 100 adalah kuadrat (1^2,2^2,3^2...)."},{"id":561,"question":"Find the value of ? in the grid:\n  ?    6    7\n 10   11   12\n 15   16   17","question_id":"Cari nilai ? dalam tabel berikut:\n  ?    6    7\n 10   11   12\n 15   16   17","options":["9","11","15","5"],"correct":3,"explanation":"Across each row the value rises by 1 per column; down each column it rises by 5 per row. So ? = 5.","explanation_id":"Di setiap baris nilainya naik 1 per kolom; di setiap kolom naik 5 per baris. Maka ? = 5."},{"id":562,"question":"Which letter comes next?\nE, F, G, H, I, ?","question_id":"Huruf apa berikutnya?\nE, F, G, H, I, ?","options":["K","I","J ","J"],"correct":3,"explanation":"Each letter advances by 1 position(s) in the alphabet. After I, skipping 1, gives J.","explanation_id":"Setiap huruf maju 1 posisi dalam alfabet. Setelah I, lompat 1, menjadi J."},{"id":563,"question":"Find the missing number:\n5 : 24  ::  2 : ?","question_id":"Cari angka yang hilang:\n5 : 24  ::  2 : ?","options":["3","8","5","7"],"correct":0,"explanation":"The rule maps n by n^2 - 1: 5->24. Applying it to 2 gives 3.","explanation_id":"Aturannya mengubah n dengan cara n^2 - 1: 5->24. Diterapkan ke 2 menghasilkan 3."},{"id":564,"question":"What is the average (mean) of these numbers?\n39, 40, 30, 3, 18","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n39, 40, 30, 3, 18","options":["29","26","156","66"],"correct":1,"explanation":"Mean = sum / count = 130 / 5 = 26.","explanation_id":"Rata-rata = jumlah / banyaknya = 130 / 5 = 26."},{"id":565,"question":"What number comes next in the sequence?\n15, 27, 39, 51, 63, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n15, 27, 39, 51, 63, ?","options":["75","99","63","87"],"correct":0,"explanation":"The sequence changes by a constant difference of 12 each step (arithmetic progression). 63 + (12) = 75.","explanation_id":"Barisan ini berubah dengan selisih tetap 12 di setiap langkah (barisan aritmetika). 63 + (12) = 75."},{"id":566,"question":"In a certain code, PLAY is written as SODB.\nHow is STACK written in that code?","question_id":"Dalam sebuah kode rahasia, PLAY ditulis sebagai SODB.\nBagaimana STACK ditulis dalam kode itu?","options":["VWDFN","XYFHP","WXEGO","UVCEM"],"correct":0,"explanation":"Each letter shifts forward by 3 position(s) (wrapping Z->A). The same shift on STACK gives VWDFN.","explanation_id":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada STACK menghasilkan VWDFN."},{"id":567,"question":"Find the missing number (?):\n5, 11, 17, 23, ?, 35","question_id":"Cari angka yang hilang (?):\n5, 11, 17, 23, ?, 35","options":["64","59","52","29"],"correct":3,"explanation":"The sequence rises by 6 each step. The term before ? is 23, so ? = 23+6 = 29.","explanation_id":"Barisan naik 6 tiap langkah. Suku sebelum ? adalah 23, jadi ? = 23+6 = 29."},{"id":568,"question":"Find the missing number:\n6 : 13  ::  7 : ?","question_id":"Cari angka yang hilang:\n6 : 13  ::  7 : ?","options":["15","64","31","29"],"correct":0,"explanation":"The rule maps n by doubling and adding 1 (2n+1): 6->13. Applying it to 7 gives 15.","explanation_id":"Aturannya mengubah n dengan cara menggandakan lalu tambah 1 (2n+1): 6->13. Diterapkan ke 7 menghasilkan 15."},{"id":569,"question":"What number comes next in the sequence?\n6, 2, 8, 10, 18, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n6, 2, 8, 10, 18, ?","options":["46","29","28","38"],"correct":2,"explanation":"Each term is the sum of the two before it. 10 + 18 = 28.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 10 + 18 = 28."},{"id":570,"question":"What is 10% of 120?","question_id":"Berapa 10% dari 120?","options":["36","120","18","12"],"correct":3,"explanation":"10% of 120 = 10/100 x 120 = 12.","explanation_id":"10% dari 120 = 10/100 x 120 = 12."},{"id":571,"question":"Complete the analogy:\nK : J  ::  R : ?","question_id":"Lengkapi analoginya:\nK : J  ::  R : ?","options":["Q","R","P","S"],"correct":0,"explanation":"K maps to J by moving 1 position(s) backward in the alphabet. The same move on R gives Q.","explanation_id":"K menjadi J dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada R menghasilkan Q."},{"id":572,"question":"What number comes next in the sequence?\n17, 12, 7, 2, -3, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n17, 12, 7, 2, -3, ?","options":["-18","-3","-13","-8"],"correct":3,"explanation":"The sequence changes by a constant difference of -5 each step (arithmetic progression). -3 + (-5) = -8.","explanation_id":"Barisan ini berubah dengan selisih tetap -5 di setiap langkah (barisan aritmetika). -3 + (-5) = -8."},{"id":573,"question":"All cats are mammals.\nAll mammals are animals.\nWhich conclusion must be true?","question_id":"Semua kucing adalah mamalia.\nSemua mamalia adalah hewan.\nKesimpulan mana yang pasti benar?","options":["Some animals are not cats.","All animals are cats.","All cats are animals.","No cats are animals."],"correct":2,"explanation":"If every member of cats is in mammals, and every member of mammals is in animals, then every member of cats is in animals (transitive). The reverse ('all animals are cats') does not follow.","explanation_id":"Jika setiap kucing termasuk mamalia, dan setiap mamalia termasuk hewan, maka setiap kucing pasti termasuk hewan (sifat transitif). Kebalikannya ('semua hewan adalah kucing') tidak otomatis benar.","options_id":["Sebagian hewan bukan kucing.","Semua hewan adalah kucing.","Semua kucing adalah hewan.","Tidak ada kucing yang termasuk hewan."]},{"id":574,"question":"What is 60% of 50?","question_id":"Berapa 60% dari 50?","options":["90","45","30","65"],"correct":2,"explanation":"60% of 50 = 60/100 x 50 = 30.","explanation_id":"60% dari 50 = 60/100 x 50 = 30."},{"id":575,"question":"Complete the analogy:\nH : J  ::  J : ?","question_id":"Lengkapi analoginya:\nH : J  ::  J : ?","options":["K","H","L","M"],"correct":2,"explanation":"H maps to J by moving 2 position(s) forward in the alphabet. The same move on J gives L.","explanation_id":"H menjadi J dengan bergeser 2 posisi maju dalam alfabet. Geseran sama pada J menghasilkan L."},{"id":576,"question":"Find the missing number:\n9 : 729  ::  8 : ?","question_id":"Cari angka yang hilang:\n9 : 729  ::  8 : ?","options":["512","576","1023","1025"],"correct":0,"explanation":"The rule maps n by cubing it (n^3): 9->729. Applying it to 8 gives 512.","explanation_id":"Aturannya Two patterns are interleaved. What comes next?\n5, 32, 8, 34, 11, 36, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n5, 32, 8, 34, 11, 36, ?","options":["17","14","11","52"],"correct":1,"explanation":"Odd positions go 5, 8, 11, ... (+3); even positions go 32, 34, 36, ... (+2). The next term continues the first pattern: 11 + 3 = 14.","explanation_id":"Posisi ganjil: 5, 8, 11, ... (+3); posisi genap: 32, 34, 36, ... (+2). Suku berikutnya melanjutkan pola pertama: 11 + 3 = 14."},{"id":592,"question":"What is the average (mean) of these numbers?\n19, 34, 35, 5, 22","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n19, 34, 35, 5, 22","options":["138","28","58","23"],"correct":3,"explanation":"Mean = sum / count = 115 / 5 = 23.","explanation_id":"Rata-rata = jumlah / banyaknya = 115 / 5 = 23."},{"id":593,"question":"Find the value of ? in the grid:\n  6    7    8\n  9   10   11\n 12    ?   14","question_id":"Cari nilai ? dalam tabel berikut:\n  6    7    8\n  9   10   11\n 12    ?   14","options":["27","29","13","25"],"correct":2,"explanation":"Across each row the value rises by 1 per column; down each column it rises by 3 per row. So ? = 13.","explanation_id":"Di setiap baris nilainya naik 1 per kolom; di setiap kolom naik 3 per baris. Maka ? = 13."},{"id":594,"question":"What number comes next in the sequence?\n24, 28, 32, 36, 40, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n24, 28, 32, 36, 40, ?","options":["48","44","52","40"],"correct":1,"explanation":"The sequence changes by a constant difference of 4 each step (arithmetic progression). 40 + (4) = 44.","explanation_id":"Barisan ini berubah dengan selisih tetap 4 di setiap langkah (barisan aritmetika). 40 + (4) = 44."},{"id":595,"question":"What number comes next in the sequence?\n20, 28, 36, 44, 52, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n20, 28, 36, 44, 52, ?","options":["60","68","76","52"],"correct":0,"explanation":"The sequence changes by a constant difference of 8 each step (arithmetic progression). 52 + (8) = 60.","explanation_id":"Barisan ini berubah dengan selisih tetap 8 di setiap langkah (barisan aritmetika). 52 + (8) = 60."},{"id":596,"question":"What number comes next in the sequence?\n2, 15, 28, 41, 54, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n2, 15, 28, 41, 54, ?","options":["54","93","80","67"],"correct":3,"explanation":"The sequence changes by a constant difference of 13 each step (arithmetic progression). 54 + (13) = 67.","explanation_id":"Barisan ini berubah dengan selisih tetap 13 di setiap langkah (barisan aritmetika). 54 + (13) = 67."},{"id":597,"question":"What is 10% of 400?","question_id":"Berapa 10% dari 400?","options":["400","120","40","60"],"correct":2,"explanation":"10% of 400 = 10/100 x 400 = 40.","explanation_id":"10% dari 400 = 10/100 x 400 = 40."},{"id":598,"question":"Complete the analogy:\nN : Q  ::  U : ?","question_id":"Lengkapi analoginya:\nN : Q  ::  U : ?","options":["Y","R","W","X"],"correct":3,"explanation":"N maps to Q by moving 3 position(s) forward in the alphabet. The same move on U gives X.","explanation_id":"N menjadi Q dengan bergeser 3 posisi maju dalam alfabet. Geseran sama pada U menghasilkan X."},{"id":599,"question":"Complete the analogy:\nF : H  ::  K : ?","question_id":"Lengkapi analoginya:\nF : H  ::  K : ?","options":["L","I","M","N"],"correct":2,"explanation":"F maps to H by moving 2 position(s) forward in the alphabet. The same move on K gives M.","explanation_id":"F menjadi H dengan bergeser 2 posisi maju dalam alfabet. Geseran sama pada K menghasilkan M."},{"id":600,"question":"What is 12% of 400?","question_id":"Berapa 12% dari 400?","options":["144","72","136","48"],"correct":3,"explanation":"12% of 400 = 12/100 x 400 = 48.","explanation_id":"12% dari 400 = 12/100 x 400 = 48."},{"id":601,"question":"What is the average (mean) of these numbers?\n39, 24, 28, 32, 12","question :"Each term is multiplied by 4 (geometric progression). 384 x 4 = 1536.","explanation_id":"Setiap suku dikalikan 4 (barisan geometri). 384 x 4 = 1536."},{"id":607,"question":"What number comes next in the sequence?\n6, 3, 9, 12, 21, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n6, 3, 9, 12, 21, ?","options":["33","45","34","54"],"correct":0,"explanation":"Each term is the sum of the two before it. 12 + 21 = 33.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 12 + 21 = 33."},{"id":608,"question":"What number comes next in the sequence?\n3, 2, 5, 7, 12, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n3, 2, 5, 7, 12, ?","options":["26","19","31","20"],"correct":1,"explanation":"Each term is the sum of the two before it. 7 + 12 = 19.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 7 + 12 = 19."},{"id":609,"question":"Find the missing number (?):\n10, 18, 26, 34, ?, 50","question_id":"Cari angka yang hilang (?):\n10, 18, 26, 34, ?, 50","options":["92","42","85","76"],"correct":1,"explanation":"The sequence rises by 8 each step. The term before ? is 34, so ? = 34+8 = 42.","explanation_id":"Barisan naik 8 tiap langkah. Suku sebelum ? adalah 34, jadi ? = 34+8 = 42."},{"id":610,"question":"What number comes next in the sequence?\n4, 4, 8, 12, 20, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n4, 4, 8, 12, 20, ?","options":["32","52","33","44"],"correct":0,"explanation":"Each term is the sum of the two before it. 12 + 20 = 32.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 12 + 20 = 32."},{"id":611,"question":"Find the missing number:\n3 : 10  ::  4 : ?","question_id":"Cari angka yang hilang:\n3 : 10  ::  4 : ?","options":["38","17","35","33"],"correct":1,"explanation":"The rule maps n by n^2 + 1: 3->10. Applying it to 4 gives 17.","explanation_id":"Aturannya mengubah n dengan cara n^2 + 1: 3->10. Diterapkan ke 4 menghasilkan 17."},{"id":612,"question":"What number comes next in the sequence?\n8, 14, 20, 26, 32, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n8, 14, 20, 26, 32, ?","options":["44","38","50","32"],"correct":1,"explanation":"The sequence changes by a constant difference of 6 each step (arithmetic progression). 32 + (6) = 38.","explanation_id":"Barisan ini berubah dengan selisih tetap 6 di setiap langkah (barisan aritmetika). 32 + (6) = 38."},{"id":613,"question":"Find the missing number:\n8 : 72  ::  5 : ?","question_id":"Cari angka yang hilang:\n8 : 72  ::  5 : ?","options":["55","61","30","59"],"correct":2,"explanation":"The rule maps n by n x (n+1): 8->72. Applying it to 5 gives 30.","explanation_id":"Aturannya mengubah n dengan cara n x (n+1): 8->72. Diterapkan ke 5 menghasilkan 30."},{"id":614,"question":"Complete the analogy:\nG : I  ::  A : ?","question_id":"Lengkapi analoginya:\nG : I  ::  A : ?","options":["A","B","D","C"],"correct":3,"explanation":"G maps to I by moving 2 position(s) forward in the alphabet. The same move on A gives C.","explanation_id":"G menjadi I dengan bergeser 2 posisi maju dalam alfabet. Geseran sama pada A menghasilkan C."},{"id":615,"question":"Find the value of ? in the grid:\n  2    6   10\n  6   10   14\n 10   14    ?","question_id":"Cari nilai ? dalam tabel berikut:\n  2    6   10\n  6   10   14\n 10   14    ?","options":["37","32","18","40"],"correct":2,"explanation":"Across each row the value rises by 4 per column; down each column it rises by 4 per row. So ? = 18.","explanation_id":"Di setiap baris nilainya naik 4 per kolom; di setiap kolom naik 4 per baris. Maka ? = 18."},{"id":616,"question":"What number comes next in the sequence?\n28, 22, 16, 10, 4, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n28, 22, 16, 10, 4, ?","options":["-14","4","-8","-2"],"correct":3,"explanation":"The sequence changes by a constant difference of -6 each step (arithmetic progression). 4 + (-6) = -2.","explanation_id":"Barisan ini berubah dengan selisih tetap -6 di setiap langkah (barisan aritmetika). 4 + (-6) = -2."},{"id":617,"question":"What number comes next in the sequence?\n2, 4, 8, 16, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n2, 4, 8, 16, ?","options":["48","34","32","30"],"correct":2,"explanation":"Each term is multiplied by 2 (geometric progression). 16 x 2 = 32.","explanation_id":"Setiap suku dikalikan 2 (barisan geometri). 16 x 2 = 32."},{"id":618,"question":"Which one does NOT belong with the others?\n49, 36, 16, 3","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n49, 36, 16, 3","options":["3","49","16","36"],"correct":0,"explanation":"3 is the only number that is not a perfect square; 16, 36, 49 are squares (1^2,2^2,3^2...).","explanation_id":"3 satu-satunya yang bukan bilangan kuadrat sempurna; 16, 36, 49 adalah kuadrat (1^2,2^2,3^2...)."},{"id":619,"question":"In a certain code, QUEUE is written as RVFVF.\nHow is CODE written in that code?","question_id":"Dalam sebuah kode rahasia, QUEUE ditulis sebagai RVFVF.\nBagaimana CODE ditulis dalam kode itu?","options":["CODE","FRGH","DPEF","EQFG"],"correct":2,"explanation":"Each letter shifts forward by 1 position(s) (wrapping Z->A). The same shift on CODE gives DPEF.","explanation_id":"Setiap huruf digeser maju 1 posisi (memutar Z->A). Geseran yang sama pada CODE menghasilkan DPEF."},{"id":620,"question":"Complete the analogy:\nN : M  ::  Q : ?","question_id":"Lengkapi analoginya:\nN : M  ::  Q : ?","options":["P","O","Q","R"],"correct":0,"explanation":"N maps to M by moving 1 position(s) backward in the alphabet. The same move on Q gives P.","explanation_id":"N menjadi M dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada Q menghasilkan P."},{"id":621,"question":"All violins are strings.\nAll strings are instruments.\nWhich conclusion must be true?","question_id":"Semua biola adalah alat musik dawai.\nSemua alat musik dawai adalah alat musik.\nKesimpulan mana yang pasti benar?","options":["All instruments are violins.","Some instruments are not violins.","All violins are instruments.","No violins are instruments."],"correct":2,"explanation":"If every member of violins is in strings, and every member of strings is in instruments, then every member of violins is in instruments (transitive). The reverse ('all instruments are violins') does not follow.","explanation_id":"Jika setiap biola termasuk alat musik dawai, dan setiap alat musik dawai termasuk alat musik, maka setiap biola pasti termasuk alat musik (sifat transitif). Kebalikannya ('semua alat musik adalah biola') tidak otomatis benar.","options_id":["Semua alat musik adalah biola.","Sebagian alat musik bukan biola.","Semua biola adalah alat musik.","Tidak ada biola yang termasuk alat musik."]},{"id":622,"question":"Find the missing number:\n3 : 9  ::  9 : ?","question_id":"Cari angka yang hilang:\n3 : 9  ::  9 : ?","options":["27","55","53","108"],"correct":0,"explanation":"The rule maps n by tripling it (3n): 3->9. Applying it to 9 gives 27.","explanation_id":"Aturannya mengubah n dengan cara mengalikan tiga (3n): 3->9. Diterapkan ke 9 menghasilkan 27."},{"id":623,"question":"In a certain code, WORD is written as ZRUG.\nHow is BIRD written in that code?","question_id":"Dalam sebuah kode rahasia, WORD ditulis sebagai ZRUG.\nBagaimana BIRD ditulis dalam kode itu?","options":["DKTF","GNWI","ELUG","FMVH"],"correct":2,"explanation":"Each letter shifts forward by 3 position(s) (wrapping Z->A). The same shift on BIRD gives ELUG.","explanation_id":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada BIRD menghasilkan ELUG."},{"id":624,"question":"Find the value of ? in the grid:\n 10   11   12\n 14   15   16\n 18   19    ?","question_id":"Cari nilai ? dalam tabel berikut:\n 10   11   12\n 14   15   16\n 18   19    ?","options":["39","41","44","20"],"correct":3,"explanation":"Across each row the value rises by 1 per column; down each column it rises by 4 per row. So ? = 20.","explanation_id":"Di setiap baris nilainya naik 1 per kolom; di setiap kolom naik 4 per baris. Maka ? = 20."},{"id":625,"question":"Which one does NOT belong with the others?\n16, 12, 15, 14","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n16, 12, 15, 14","options":["15","16","12","14"],"correct":0,"explanation":"15 is the only odd number; the rest are even.","explanation_id":"15 satu-satunya bilangan ganjil; sisanya genap."},{"id":626,"question":"What is the average (mean) of these numbers?\n36, 17, 16","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n36, 17, 16","options":["92","23","39","59"],"correct":1,"explanation":"Mean = sum / count = 69 / 3 = 23.","explanation_id":"Rata-rata = jumlah / banyaknya = 69 / 3 = 23."},{"id":627,"question":"Complete the analogy:\nR : Q  ::  B : ?","question_id":"Lengkapi analoginya:\nR : Q  ::  B : ?","options":["C","A ","B","A"],"correct":3,"explanation":"R maps to Q by moving 1 position(s) backward in the alphabet. The same move on B gives A.","explanation_id":"R menjadi Q dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada B menghasilkan A."},{"id":628,"question":"What is the average (mean) of these numbers?\n26, 31, 18, 13","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n26, 31, 18, 13","options":["22","110","35","53"],"correct":0,"explanation":"Mean = sum / count = 88 / 4 = 22.","explanation_id":"Rata-rata = jumlah / banyaknya = 88 / 4 = 22."},{"id":629,"question":"Which letter comes next?\nK, N, Q, T, W, ?","question_id":"Huruf apa berikutnya?\nK, N, Q, T, W, ?","options":["X","Z","Y","Z "],"correct":1,"explanation":"Each letter advances by 3 position(s) in the alphabet. After W, skipping 3, gives Z.","explanation_id":"Setiap huruf maju 3 posisi dalam alfabet. Setelah W, lompat 3, menjadi Z."},{"id":630,"question":"All emeralds are gems.\nNo gems are stones.\nWhich conclusion must be true?","question_id":"Semua zamrud adalah permata.\nTidak ada permata yang termasuk batu.\nKesimpulan mana yang pasti ang muncul berikutnya dalam barisan ini?\n29, 36, 43, 50, 57, ?","options":["57","71","78","64"],"correct":3,"explanation":"The sequence changes by a constant difference of 7 each step (arithmetic progression). 57 + (7) = 64.","explanation_id":"Barisan ini berubah dengan selisih tetap 7 di setiap langkah (barisan aritmetika). 57 + (7) = 64."},{"id":735,"question":"Find the missing number (?):\n5, 8, 11, ?, 17, 20","question_id":"Cari angka yang hilang (?):\n5, 8, 11, ?, 17, 20","options":["29","14","25","31"],"correct":1,"explanation":"The sequence rises by 3 each step. The term before ? is 11, so ? = 11+3 = 14.","explanation_id":"Barisan naik 3 tiap langkah. Suku sebelum ? adalah 11, jadi ? = 11+3 = 14."},{"id":736,"question":"Complete the analogy:\nB : E  ::  L : ?","question_id":"Lengkapi analoginya:\nB : E  ::  L : ?","options":["N","P","I","O"],"correct":3,"explanation":"B maps to E by moving 3 position(s) forward in the alphabet. The same move on L gives O.","explanation_id":"B menjadi E dengan bergeser 3 posisi maju dalam alfabet. Geseran sama pada L menghasilkan O."},{"id":737,"question":"What number comes next in the sequence?\n7, 1, 8, 9, 17, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n7, 1, 8, 9, 17, ?","options":["26","43","35","27"],"correct":0,"explanation":"Each term is the sum of the two before it. 9 + 17 = 26.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 9 + 17 = 26."},{"id":738,"question":"What is 40% of 100?","question_id":"Berapa 40% dari 100?","options":["120","60","40","90"],"correct":2,"explanation":"40% of 100 = 40/100 x 100 = 40.","explanation_id":"40% dari 100 = 40/100 x 100 = 40."},{"id":739,"question":"Find the missing number:\n5 : 125  ::  6 : ?","question_id":"Cari angka yang hilang:\n5 : 125  ::  6 : ?","options":["431","216","433","252"],"correct":1,"explanation":"The rule maps n by cubing it (n^3): 5->125. Applying it to 6 gives 216.","explanation_id":"Aturannya mengubah n dengan cara memangkatkan tiga (n^3): 5->125. Diterapkan ke 6 menghasilkan 216."},{"id":740,"question":"Two patterns are interleaved. What comes next?\n6, 29, 10, 25, 14, 21, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n6, 29, 10, 25, 14, 21, ?","options":["35","14","18","22"],"correct":2,"explanation":"Odd positions go 6, 10, 14, ... (+4); even positions go 29, 25, 21, ... (-4). The next term continues the first pattern: 14 + 4 = 18.","explanation_id":"Posisi ganjil: 6, 10, 14, ... (+4); posisi genap: 29, 25, 21, ... (-4). Suku berikutnya melanjutkan pola pertama: 14 + 4 = 18."},{"id":741,"question":"Find the value of ? in the grid:\n  4    7   10\n  9   12   15\n 14   17    ?","question_id":"Cari nilai ? dalam tabel berikut:\n  4    7   10\n  9   12   15\n 14   17    ?","options":["45","43","37","20"],"correct":3,"explanation":"Across each row the value rises by 3 per column; down each column it rises by 5 per row. So ? = 20.","explanation_id":"Di setiap baris nilainya naik 3 per kolom; di setiap kolom naik 5 per baris. Maka ? = 20."},{"id":742,"question":"What is the average (mean) of these numbers?\n19, 25, 7","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n19, 25, 7","options":["68","42","24","17"],"correct":3,"explanation":"Mean = sum / count = 51 / 3 = 17.","explanation_id":"Rata-rata = jumlah / banyaknya = 51 / 3 = 17."},{"id":743,"question":"What number comes next in the sequence?\n10, 21, 32, 43, 54, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n10, 21, 32, 43, 54, ?","options":["76","54","87","65"],"correct":3,"explanation":"The sequence changes by a constant difference of 11 each step (arithmetic progression). 54 + (11) = 65.","explanation_id":"Barisan ini berubah dengan selisih tetap 11 di setiap langkah (barisan aritmetika). 54 + (11) = 65."},{"id":744,"question":"What number comes next in the sequence?\n10, 2, -6, -14, -22, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\
