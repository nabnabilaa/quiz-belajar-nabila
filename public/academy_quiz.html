 Applying it to 7 gives 50.","explanation_id":"Aturannya mengubah n dengan cara n^2 + 1: 5->26. Diterapkan ke 7 menghasilkan 50."},{"id":750,"question":"What number comes next in the sequence?\n30, 43, 56, 69, 82, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n30, 43, 56, 69, 82, ?","options":["121","95","82","108"],"correct":1,"explanation":"The sequence changes by a constant difference of 13 each step (arithmetic progression). 82 + (13) = 95.","explanation_id":"Barisan ini berubah dengan selisih tetap 13 di setiap langkah (barisan aritmetika). 82 + (13) = 95."},{"id":751,"question":"What number comes next in the sequence?\n15, 10, 5, 0, -5, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n15, 10, 5, 0, -5, ?","options":["-10","-5","-15","-20"],"correct":0,"explanation":"The sequence changes by a constant difference of -5 each step (arithmetic progression). -5 + (-5) = -10.","explanation_id":"Barisan ini berubah dengan selisih tetap -5 di setiap langkah (barisan aritmetika). -5 + (-5) = -10."},{"id":752,"question":"Find the value of ? in the grid:\n  6   10    ?\n 10   14   18\n 14   18   22","question_id":"Cari nilai ? dalam tabel berikut:\n  6   10    ?\n 10   14   18\n 14   18   22","options":["32","29","24","14"],"correct":3,"explanation":"Across each row the value rises by 4 per column; down each column it rises by 4 per row. So ? = 14.","explanation_id":"Di setiap baris nilainya naik 4 per kolom; di setiap kolom naik 4 per baris. Maka ? = 14."},{"id":753,"question":"What is the average (mean) of these numbers?\n31, 35, 38, 4","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n31, 35, 38, 4","options":["27","135","65","31"],"correct":0,"explanation":"Mean = sum / count = 108 / 4 = 27.","explanation_id":"Rata-rata = jumlah / banyaknya = 108 / 4 = 27."},{"id":754,"question":"Which one does NOT belong with the others?\n37, 22, 29, 13","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n37, 22 ":"In a certain code, CODE is written as FRGH.\nHow is HEAP written in that code?","question_id":"Dalam sebuah kode rahasia, CODE ditulis sebagai FRGH.\nBagaimana HEAP ditulis dalam kode itu?","options":["JGCR","KHDS","MJFU","LIET"],"correct":1,"explanation":"Each letter shifts forward by 3 position(s) (wrapping Z->A). The same shift on HEAP gives KHDS.","explanation_id":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada HEAP menghasilkan KHDS."},{"id":760,"question":"What is the average (mean) of these numbers?\n17, 39, 26, 14","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n17, 39, 26, 14","options":["63","24","120","38"],"correct":1,"explanation":"Mean = sum / count = 96 / 4 = 24.","explanation_id":"Rata-rata = jumlah / banyaknya = 96 / 4 = 24."},{"id":761,"question":"What number comes next in the sequence?\n7, 4, 11, 15, 26, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n7, 4, 11, 15, 26, ?","options":["56","67","41","42"],"correct":2,"explanation":"Each term is the sum of the two before it. 15 + 26 = 41.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 15 + 26 = 41."},{"id":762,"question":"What number comes next in the sequence?\n16, 22, 28, 34, 40, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n16, 22, 28, 34, 40, ?","options":["40","46","58","52"],"correct":1,"explanation":"The sequence changes by a constant difference of 6 each step (arithmetic progression). 40 + (6) = 46.","explanation_id":"Barisan ini berubah dengan selisih tetap 6 di setiap langkah (barisan aritmetika). 40 + (6) = 46."},{"id":763,"question":"What number comes next in the sequence?\n-8, -3, 2, 7, 12, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n-8, -3, 2, 7, 12, ?","options":["12","17","22","27"],"correct":1,"explanation":"The sequence changes by a constant difference of 5 each step (arithmetic progression). 12 + (5) = 17.","explanation_id":"Barisan ini berubah deng  = 58.","explanation_id":"Barisan ini berubah dengan selisih tetap 6 di setiap langkah (barisan aritmetika). 52 + (6) = 58."},{"id":822,"question":"Two patterns are interleaved. What comes next?\n6, 20, 11, 22, 16, 24, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n6, 20, 11, 22, 16, 24, ?","options":["21","26","16","47"],"correct":0,"explanation":"Odd positions go 6, 11, 16, ... (+5); even positions go 20, 22, 24, ... (+2). The next term continues the first pattern: 16 + 5 = 21.","explanation_id":"Posisi ganjil: 6, 11, 16, ... (+5); posisi genap: 20, 22, 24, ... (+2). Suku berikutnya melanjutkan pola pertama: 16 + 5 = 21."},{"id":823,"question":"In a certain code, DOG is written as GRJ.\nHow is BIRD written in that code?","question_id":"Dalam sebuah kode rahasia, DOG ditulis sebagai GRJ.\nBagaimana BIRD ditulis dalam kode itu?","options":["DKTF","FMVH","ELUG","GNWI"],"correct":2,"explanation":"Each letter shifts forward by 3 position(s) (wrapping Z->A). The same shift on BIRD gives ELUG.","explanation_id":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada BIRD menghasilkan ELUG."},{"id":824,"question":"What is 25% of 500?","question_id":"Berapa 25% dari 500?","options":["300","375","251","125"],"correct":3,"explanation":"25% of 500 = 25/100 x 500 = 125.","explanation_id":"25% dari 500 = 25/100 x 500 = 125."},{"id":825,"question":"In a certain code, FUNC is written as CRKZ.\nHow is CODE written in that code?","question_id":"Dalam sebuah kode rahasia, FUNC ditulis sebagai CRKZ.\nBagaimana CODE ditulis dalam kode itu?","options":["BNCD","ZLAB","YKZA","AMBC"],"correct":1,"explanation":"Each letter shifts forward by 23 position(s) (wrapping Z->A). The same shift on CODE gives ZLAB.","explanation_id":"Setiap huruf digeser maju 23 posisi (memutar Z->A). Geseran yang sama pada CODE menghasilkan ZLAB."},{"id":826,"question":"In a certain code, LOOP is written as ORRS.\nHow is GAME written in that code?","question_id  is decreased by 25%. What is the new value?","question_id":"Nilai 80 diturunkan sebesar 25%. Berapa nilai barunya?","options":["119","60","160","140"],"correct":1,"explanation":"25% of 80 is 20. Decreased: 80 - 20 = 60.","explanation_id":"25% dari 80 adalah 20. Diturunkan: 80 - 20 = 60."},{"id":859,"question":"Two patterns are interleaved. What comes next?\n6, 38, 9, 34, 12, 30, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n6, 38, 9, 34, 12, 30, ?","options":["12","41","18","15"],"correct":3,"explanation":"Odd positions go 6, 9, 12, ... (+3); even positions go 38, 34, 30, ... (-4). The next term continues the first pattern: 12 + 3 = 15.","explanation_id":"Posisi ganjil: 6, 9, 12, ... (+3); posisi genap: 38, 34, 30, ... (-4). Suku berikutnya melanjutkan pola pertama: 12 + 3 = 15."},{"id":860,"question":"Find the missing number:\n6 : 18  ::  4 : ?","question_id":"Cari angka yang hilang:\n6 : 18  ::  4 : ?","options":["12","23","28","25"],"correct":0,"explanation":"The rule maps n by tripling it (3n): 6->18. Applying it to 4 gives 12.","explanation_id":"Aturannya mengubah n dengan cara mengalikan tiga (3n): 6->18. Diterapkan ke 4 menghasilkan 12."},{"id":861,"question":"Find the missing number (?):\n10, 13, ?, 19, 22, 25","question_id":"Cari angka yang hilang (?):\n10, 13, ?, 19, 22, 25","options":["33","29","35","16"],"correct":3,"explanation":"The sequence rises by 3 each step. The term before ? is 13, so ? = 13+3 = 16.","explanation_id":"Barisan naik 3 tiap langkah. Suku sebelum ? adalah 13, jadi ? = 13+3 = 16."},{"id":862,"question":"What is 60% of 150?","question_id":"Berapa 60% dari 150?","options":["90","195","135","270"],"correct":0,"explanation":"60% of 150 = 60/100 x 150 = 90.","explanation_id":"60% dari 150 = 60/100 x 150 = 90."},{"id":863,"question":"All oaks are trees.\nAll trees are plants.\nWhich conclusion must be true?","question_id":"Semua pohon ek adalah pohon.\nSemua pohon adalah tumbuhan.\nKesimpulan mana yang pasti benar?","options":["Some plants are not oaks.","All oaks are plants.","No oaks are plants.","All plants are oaks."],"correct":1,"explanation":"If every member of oaks is in trees, and every member of trees is in plants, then every member of oaks is in plants (transitive). The reverse ('all plants are oaks') does not follow.","explanation_id":"Jika setiap pohon ek termasuk pohon, dan setiap pohon termasuk tumbuhan, maka setiap pohon ek pasti termasuk tumbuhan (sifat transitif). Kebalikannya ('semua tumbuhan adalah pohon ek') tidak otomatis benar.","options_id":["Sebagian tumbuhan bukan pohon ek.","Semua pohon ek adalah tumbuhan.","Tidak ada pohon ek yang termasuk tumbuhan.","Semua tumbuhan adalah pohon ek."]},{"id":864,"question":"What is 30% of 300?","question_id":"Berapa 30% dari 300?","options":["135","90","270","210"],"correct":1,"explanation":"30% of 300 = 30/100 x 300 = 90.","explanation_id":"30% dari 300 = 30/100 x 300 = 90."},{"id":865,"question":"Which letter comes next?\nD, G, J, M, P, ?","question_id":"Huruf apa berikutnya?\nD, G, J, M, P, ?","options":["S","T","R","Q"],"correct":0,"explanation":"Each letter advances by 3 position(s) in the alphabet. After P, skipping 3, gives S.","explanation_id":"Setiap huruf maju 3 posisi dalam alfabet. Setelah P, lompat 3, menjadi S."},{"id":866,"question":"A value of 100 is decreased by 50%. What is the new value?","question_id":"Nilai 100 diturunkan sebesar 50%. Berapa nilai barunya?","options":["50","150","200","99"],"correct":0,"explanation":"50% of 100 is 50. Decreased: 100 - 50 = 50.","explanation_id":"50% dari 100 adalah 50. Diturunkan: 100 - 50 = 50."},{"id":867,"question":"A value of 200 is decreased by 10%. What is the new value?","question_id":"Nilai 200 diturunkan sebesar 10%. Berapa nilai barunya?","options":["400","359","380","180"],"correct":3,"explanation":"10% of 200 is 20. Decreased: 200 - 20 = 180.","explanation_id":"10% dari 200 adalah 20. Diturunkan: 200 - 20 = 180."},{"id":868,"question":"Wha  13, 16, ?, 22, 25","options":["19","39","41","35"],"correct":0,"explanation":"The sequence rises by 3 each step. The term before ? is 16, so ? = 16+3 = 19.","explanation_id":"Barisan naik 3 tiap langkah. Suku sebelum ? adalah 16, jadi ? = 16+3 = 19."},{"id":879,"question":"All sedans are cars.\nAll cars are vehicles.\nWhich conclusion must be true?","question_id":"Semua sedan adalah mobil.\nSemua mobil adalah kendaraan.\nKesimpulan mana yang pasti benar?","options":["Some vehicles are not sedans.","All vehicles are sedans.","All sedans are vehicles.","No sedans are vehicles."],"correct":2,"explanation":"If every member of sedans is in cars, and every member of cars is in vehicles, then every member of sedans is in vehicles (transitive). The reverse ('all vehicles are sedans') does not follow.","explanation_id":"Jika setiap sedan termasuk mobil, dan setiap mobil termasuk kendaraan, maka setiap sedan pasti termasuk kendaraan (sifat transitif). Kebalikannya ('semua kendaraan adalah sedan') tidak otomatis benar.","options_id":["Sebagian kendaraan bukan sedan.","Semua kendaraan adalah sedan.","Semua sedan adalah kendaraan.","Tidak ada sedan yang termasuk kendaraan."]},{"id":880,"question":"What number comes next in the sequence?\n12, 20, 28, 36, 44, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n12, 20, 28, 36, 44, ?","options":["68","52","60","44"],"correct":1,"explanation":"The sequence changes by a constant difference of 8 each step (arithmetic progression). 44 + (8) = 52.","explanation_id":"Barisan ini berubah dengan selisih tetap 8 di setiap langkah (barisan aritmetika). 44 + (8) = 52."},{"id":881,"question":"Which one does NOT belong with the others?\n23, 12, 5, 19","question_id":"Mana yang TIDAK termasuk kelompok yang sama?\n23, 12, 5, 19","options":["12","23","5","19"],"correct":0,"explanation":"12 is the only composite number; the others (5, 19, 23) are prime.","explanation_id":"12 adalah satu-satunya bilangan komposit; sisanya (5, 19, 23) bilangan prima."},{"id":882,"question":"In a certain code, ARRAY is written as YPPYW.\nHow is APPLE written in that code?","question_id":"Dalam sebuah kode rahasia, ARRAY ditulis sebagai YPPYW.\nBagaimana APPLE ditulis dalam kode itu?","options":["APPLE","ZOOKD","YNNJC","XMMIB"],"correct":2,"explanation":"Each letter shifts forward by 24 position(s) (wrapping Z->A). The same shift on APPLE gives YNNJC.","explanation_id":"Setiap huruf digeser maju 24 posisi (memutar Z->A). Geseran yang sama pada APPLE menghasilkan YNNJC."},{"id":883,"question":"What is 60% of 100?","question_id":"Berapa 60% dari 100?","options":["180","130","90","60"],"correct":3,"explanation":"60% of 100 = 60/100 x 100 = 60.","explanation_id":"60% dari 100 = 60/100 x 100 = 60."},{"id":884,"question":"Which letter comes next?\nK, L, M, N, O, ?","question_id":"Huruf apa berikutnya?\nK, L, M, N, O, ?","options":["O","P ","Q","P"],"correct":3,"explanation":"Each letter advances by 1 position(s) in the alphabet. After O, skipping 1, gives P.","explanation_id":"Setiap huruf maju 1 posisi dalam alfabet. Setelah O, lompat 1, menjadi P."},{"id":885,"question":"Find the value of ? in the grid:\n  4    8   12\n  ?   13   17\n 14   18   22","question_id":"Cari nilai ? dalam tabel berikut:\n  4    8   12\n  ?   13   17\n 14   18   22","options":["23","9","14","22"],"correct":1,"explanation":"Across each row the value rises by 4 per column; down each column it rises by 5 per row. So ? = 9.","explanation_id":"Di setiap baris nilainya naik 4 per kolom; di setiap kolom naik 5 per baris. Maka ? = 9."},{"id":886,"question":"Find the missing number (?):\n20, 23, 26, ?, 32, 35","question_id":"Cari angka yang hilang (?):\n20, 23, 26, ?, 32, 35","options":["59","29","55","61"],"correct":1,"explanation":"The sequence rises by 3 each step. The term before ? is 26, so ? = 26+3 = 29.","explanation_id":"Barisan naik 3 tiap langkah. Suku sebelum ? adalah 26, jadi ? = 26+3 = 29."},{"id":887,"question":"Find the missing number (?):\n18, 24, 30, 36, ?, 48","question_id":"Cari angka yang hilang (?):\n18, 24, 30, 36, ?, 48","options":["42","90","85","78"],"correct":0,"explanation":"The sequence rises by 6 each step. The term before ? is 36, so ? = 36+6 = 42.","explanation_id":"Barisan naik 6 tiap langkah. Suku sebelum ? adalah 36, jadi ? = 36+6 = 42."},{"id":888,"question":"All squares are rectangles.\nNo rectangles are stones.\nWhich conclusion must be true?","question_id":"Semua persegi adalah persegi panjang.\nTidak ada persegi panjang yang termasuk batu.\nKesimpulan mana yang pasti benar?","options":["All stones are squares.","Some squares are stones.","No squares are stones.","Some stones are rectangles."],"correct":2,"explanation":"Since every member of squares is in rectangles, and no member of rectangles is in stones, no member of squares can be in stones.","explanation_id":"Karena setiap persegi termasuk persegi panjang, dan tidak ada persegi panjang yang termasuk batu, maka tidak ada persegi yang bisa menjadi batu.","options_id":["Semua batu adalah persegi.","Sebagian persegi adalah batu.","Tidak ada persegi yang termasuk batu.","Sebagian batu adalah persegi panjang."]},{"id":889,"question":"Complete the analogy:\nE : D  ::  J : ?","question_id":"Lengkapi analoginya:\nE : D  ::  J : ?","options":["H","K","I","J"],"correct":2,"explanation":"E maps to D by moving 1 position(s) backward in the alphabet. The same move on J gives I.","explanation_id":"E menjadi D dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada J menghasilkan I."},{"id":890,"question":"What is the average (mean) of these numbers?\n7, 39, 14","question_id":"Berapa rata-rata (mean) dari angka-angka ini?\n7, 39, 14","options":["80","59","20","27"],"correct":2,"explanation":"Mean = sum / count = 60 / 3 = 20.","explanation_id":"Rata-rata = jumlah / banyaknya = 60 / 3 = 20."},{"id":891,"question":"What number comes next in the sequence?\n14, 25, 36, 47, 58, ?","question_id":"Angka berapa yang muncul beriku rrect":2,"explanation":"E maps to D by moving 1 position(s) backward in the alphabet. The same move on K gives J.","explanation_id":"E menjadi D dengan bergeser 1 posisi mundur dalam alfabet. Geseran sama pada K menghasilkan J."},{"id":912,"question":"What number comes next?\n1, 3, 6, 10, 15, ?","question_id":"Angka berapa berikutnya?\n1, 3, 6, 10, 15, ?","options":["28","20","21","36"],"correct":2,"explanation":"These are triangular numbers (1+2+...+n). The gaps grow by 1 each step, making the next term 21.","explanation_id":"Ini bilangan segitiga (1+2+...+n). Selisihnya bertambah 1 tiap langkah, sehingga suku berikutnya 21."},{"id":913,"question":"All cats are mammals.\nNo mammals are stones.\nWhich conclusion must be true?","question_id":"Semua kucing adalah mamalia.\nTidak ada mamalia yang termasuk batu.\nKesimpulan mana yang pasti benar?","options":["No cats are stones.","All stones are cats.","Some cats are stones.","Some stones are mammals."],"correct":0,"explanation":"Since every member of cats is in mammals, and no member of mammals is in stones, no member of cats can be in stones.","explanation_id":"Karena setiap kucing termasuk mamalia, dan tidak ada mamalia yang termasuk batu, maka tidak ada kucing yang bisa menjadi batu.","options_id":["Tidak ada kucing yang termasuk batu.","Semua batu adalah kucing.","Sebagian kucing adalah batu.","Sebagian batu adalah mamalia."]},{"id":914,"question":"What number comes next in the sequence?\n11, 14, 17, 20, 23, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n11, 14, 17, 20, 23, ?","options":["26","29","23","32"],"correct":0,"explanation":"The sequence changes by a constant difference of 3 each step (arithmetic progression). 23 + (3) = 26.","explanation_id":"Barisan ini berubah dengan selisih tetap 3 di setiap langkah (barisan aritmetika). 23 + (3) = 26."},{"id":915,"question":"Two patterns are interleaved. What comes next?\n5, 40, 7, 35, 9, 30, ?","question_id":"Ada dua pola yang disisipkan b nce?\n9, 5, 14, 19, 33, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n9, 5, 14, 19, 33, ?","options":["85","52","53","71"],"correct":1,"explanation":"Each term is the sum of the two before it. 19 + 33 = 52.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 19 + 33 = 52."},{"id":942,"question":"What is 75% of 200?","question_id":"Berapa 75% dari 200?","options":["320","450","225","150"],"correct":3,"explanation":"75% of 200 = 75/100 x 200 = 150.","explanation_id":"75% dari 200 = 75/100 x 200 = 150."},{"id":943,"question":"What number comes next in the sequence?\n4, 2, 0, -2, -4, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n4, 2, 0, -2, -4, ?","options":["-10","-8","-6","-4"],"correct":2,"explanation":"The sequence changes by a constant difference of -2 each step (arithmetic progression). -4 + (-2) = -6.","explanation_id":"Barisan ini berubah dengan selisih tetap -2 di setiap langkah (barisan aritmetika). -4 + (-2) = -6."},{"id":944,"question":"All sparrows are birds.\nAll birds are animals.\nWhich conclusion must be true?","question_id":"Semua burung gereja adalah burung.\nSemua burung adalah hewan.\nKesimpulan mana yang pasti benar?","options":["Some animals are not sparrows.","All sparrows are animals.","No sparrows are animals.","All animals are sparrows."],"correct":1,"explanation":"If every member of sparrows is in birds, and every member of birds is in animals, then every member of sparrows is in animals (transitive). The reverse ('all animals are sparrows') does not follow.","explanation_id":"Jika setiap burung gereja termasuk burung, dan setiap burung termasuk hewan, maka setiap burung gereja pasti termasuk hewan (sifat transitif). Kebalikannya ('semua hewan adalah burung gereja') tidak otomatis benar.","options_id":["Sebagian hewan bukan burung gereja.","Semua burung gereja adalah hewan.","Tidak ada burung gereja yang termasuk hewan.","Semua hewan adalah burung gereja."]},{"id":945,"question":"What lphabet. After S, skipping 4, gives W.","explanation_id":"Setiap huruf maju 4 posisi dalam alfabet. Setelah S, lompat 4, menjadi W."},{"id":951,"question":"All roses are flowers.\nNo flowers are stones.\nWhich conclusion must be true?","question_id":"Semua mawar adalah bunga.\nTidak ada bunga yang termasuk batu.\nKesimpulan mana yang pasti benar?","options":["Some roses are stones.","All stones are roses.","No roses are stones.","Some stones are flowers."],"correct":2,"explanation":"Since every member of roses is in flowers, and no member of flowers is in stones, no member of roses can be in stones.","explanation_id":"Karena setiap mawar termasuk bunga, dan tidak ada bunga yang termasuk batu, maka tidak ada mawar yang bisa menjadi batu.","options_id":["Sebagian mawar adalah batu.","Semua batu adalah mawar.","Tidak ada mawar yang termasuk batu.","Sebagian batu adalah bunga."]},{"id":952,"question":"What number comes next in the sequence?\n-6, -12, -18, -24, -30, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n-6, -12, -18, -24, -30, ?","options":["-48","-42","-36","-30"],"correct":2,"explanation":"The sequence changes by a constant difference of -6 each step (arithmetic progression). -30 + (-6) = -36.","explanation_id":"Barisan ini berubah dengan selisih tetap -6 di setiap langkah (barisan aritmetika). -30 + (-6) = -36."},{"id":953,"question":"Complete the analogy:\nE : H  ::  T : ?","question_id":"Lengkapi analoginya:\nE : H  ::  T : ?","options":["Q","X","V","W"],"correct":3,"explanation":"E maps to H by moving 3 position(s) forward in the alphabet. The same move on T gives W.","explanation_id":"E menjadi H dengan bergeser 3 posisi maju dalam alfabet. Geseran sama pada T menghasilkan W."},{"id":954,"question":"What number comes next in the sequence?\n5, 20, 80, 320, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n5, 20, 80, 320, ?","options":["1276","1600","1280","1284"],"correct":2,"explanation":"Each term is multiplied by 4 (geometric progression). 320 x 4 = 1280.","explanation_id":"Setiap suku dikalikan 4 (barisan geometri). 320 x 4 = 1280."},{"id":955,"question":"In a certain code, BOOK is written as ERRN.\nHow is TREE written in that code?","question_id":"Dalam sebuah kode rahasia, BOOK ditulis sebagai ERRN.\nBagaimana TREE ditulis dalam kode itu?","options":["VTGG","YWJJ","WUHH","XVII"],"correct":2,"explanation":"Each letter shifts forward by 3 position(s) (wrapping Z->A). The same shift on TREE gives WUHH.","explanation_id":"Setiap huruf digeser maju 3 posisi (memutar Z->A). Geseran yang sama pada TREE menghasilkan WUHH."},{"id":956,"question":"Two patterns are interleaved. What comes next?\n2, 20, 4, 17, 6, 14, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n2, 20, 4, 17, 6, 14, ?","options":["19","8","6","10"],"correct":1,"explanation":"Odd positions go 2, 4, 6, ... (+2); even positions go 20, 17, 14, ... (-3). The next term continues the first pattern: 6 + 2 = 8.","explanation_id":"Posisi ganjil: 2, 4, 6, ... (+2); posisi genap: 20, 17, 14, ... (-3). Suku berikutnya melanjutkan pola pertama: 6 + 2 = 8."},{"id":957,"question":"What number comes next in the sequence?\n3, 6, 12, 24, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n3, 6, 12, 24, ?","options":["72","48","50","46"],"correct":1,"explanation":"Each term is multiplied by 2 (geometric progression). 24 x 2 = 48.","explanation_id":"Setiap suku dikalikan 2 (barisan geometri). 24 x 2 = 48."},{"id":958,"question":"Find the value of ? in the grid:\n  6   10   14\n  9   13   17\n  ?   16   20","question_id":"Cari nilai ? dalam tabel berikut:\n  6   10   14\n  9   13   17\n  ?   16   20","options":["28","20","27","12"],"correct":3,"explanation":"Across each row the value rises by 4 per column; down each column it rises by 3 per row. So ? = 12.","explanation_id":"Di setiap baris nilainya naik 4 per kolom; di setiap kolom naik 3 per baris. Maka ? = 12."},{"id":959,"question":"Complete the analogy:\nP : Q  ::  G : ?","question_id":"Lengkapi analoginya:\nP : Q  ::  G : ?","options":["I","G","H","F"],"correct":2,"explanation":"P maps to Q by moving 1 position(s) forward in the alphabet. The same move on G gives H.","explanation_id":"P menjadi Q dengan bergeser 1 posisi maju dalam alfabet. Geseran sama pada G menghasilkan H."},{"id":960,"question":"What number comes next in the sequence?\n0, 3, 6, 9, 12, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n0, 3, 6, 9, 12, ?","options":["15","21","12","18"],"correct":0,"explanation":"The sequence changes by a constant difference of 3 each step (arithmetic progression). 12 + (3) = 15.","explanation_id":"Barisan ini berubah dengan selisih tetap 3 di setiap langkah (barisan aritmetika). 12 + (3) = 15."},{"id":961,"question":"Two patterns are interleaved. What comes next?\n10, 34, 12, 31, 14, 28, ?","question_id":"Ada dua pola yang disisipkan bergantian. Mana yang berikutnya?\n10, 34, 12, 31, 14, 28, ?","options":["18","41","14","16"],"correct":3,"explanation":"Odd positions go 10, 12, 14, ... (+2); even positions go 34, 31, 28, ... (-3). The next term continues the first pattern: 14 + 2 = 16.","explanation_id":"Posisi ganjil: 10, 12, 14, ... (+2); posisi genap: 34, 31, 28, ... (-3). Suku berikutnya melanjutkan pola pertama: 14 + 2 = 16."},{"id":962,"question":"What number comes next in the sequence?\n26, 38, 50, 62, 74, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n26, 38, 50, 62, 74, ?","options":["74","110","98","86"],"correct":3,"explanation":"The sequence changes by a constant difference of 12 each step (arithmetic progression). 74 + (12) = 86.","explanation_id":"Barisan ini berubah dengan selisih tetap 12 di setiap langkah (barisan aritmetika). 74 + (12) = 86."},{"id":963,"question":"In a certain code, CLASS is written as ZIXPP.\nHow is GAME written in that code?","question_id":"Dalam sebuah kode rahasia, CLASS ditulis sebagai ZIXPP.\nBagaimana GAME :"Barisan ini berubah dengan selisih tetap -6 di setiap langkah (barisan aritmetika). -18 + (-6) = -24."},{"id":989,"question":"All sparrows are birds.\nNo birds are stones.\nWhich conclusion must be true?","question_id":"Semua burung gereja adalah burung.\nTidak ada burung yang termasuk batu.\nKesimpulan mana yang pasti benar?","options":["No sparrows are stones.","Some sparrows are stones.","All stones are sparrows.","Some stones are birds."],"correct":0,"explanation":"Since every member of sparrows is in birds, and no member of birds is in stones, no member of sparrows can be in stones.","explanation_id":"Karena setiap burung gereja termasuk burung, dan tidak ada burung yang termasuk batu, maka tidak ada burung gereja yang bisa menjadi batu.","options_id":["Tidak ada burung gereja yang termasuk batu.","Sebagian burung gereja adalah batu.","Semua batu adalah burung gereja.","Sebagian batu adalah burung."]},{"id":990,"question":"In a certain code, PLAY is written as OKZX.\nHow is HEAP written in that code?","question_id":"Dalam sebuah kode rahasia, PLAY ditulis sebagai OKZX.\nBagaimana HEAP ditulis dalam kode itu?","options":["GDZO","FCYN","HEAP","IFBQ"],"correct":0,"explanation":"Each letter shifts forward by 25 position(s) (wrapping Z->A). The same shift on HEAP gives GDZO.","explanation_id":"Setiap huruf digeser maju 25 posisi (memutar Z->A). Geseran yang sama pada HEAP menghasilkan GDZO."},{"id":991,"question":"What number comes next in the sequence?\n30, 25, 20, 15, 10, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n30, 25, 20, 15, 10, ?","options":["0","-5","10","5"],"correct":3,"explanation":"The sequence changes by a constant difference of -5 each step (arithmetic progression). 10 + (-5) = 5.","explanation_id":"Barisan ini berubah dengan selisih tetap -5 di setiap langkah (barisan aritmetika). 10 + (-5) = 5."},{"id":992,"question":"Complete the analogy:\nD : G  ::  O : ?","question_id":"Lengkapi analoginya:\nD : G  ::  O : ?","options":["L","S","R","Q"],"correct":2,"explanation":"D maps to G by moving 3 position(s) forward in the alphabet. The same move on O gives R.","explanation_id":"D menjadi G dengan bergeser 3 posisi maju dalam alfabet. Geseran sama pada O menghasilkan R."},{"id":993,"question":"Find the missing number (?):\n16, 18, ?, 22, 24, 26","question_id":"Cari angka yang hilang (?):\n16, 18, ?, 22, 24, 26","options":["42","41","38","20"],"correct":3,"explanation":"The sequence rises by 2 each step. The term before ? is 18, so ? = 18+2 = 20.","explanation_id":"Barisan naik 2 tiap langkah. Suku sebelum ? adalah 18, jadi ? = 18+2 = 20."},{"id":994,"question":"What number comes next in the sequence?\n24, 17, 10, 3, -4, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n24, 17, 10, 3, -4, ?","options":["-11","-25","-4","-18"],"correct":0,"explanation":"The sequence changes by a constant difference of -7 each step (arithmetic progression). -4 + (-7) = -11.","explanation_id":"Barisan ini berubah dengan selisih tetap -7 di setiap langkah (barisan aritmetika). -4 + (-7) = -11."},{"id":995,"question":"What number comes next in the sequence?\n-5, -13, -21, -29, -37, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n-5, -13, -21, -29, -37, ?","options":["-53","-45","-37","-61"],"correct":1,"explanation":"The sequence changes by a constant difference of -8 each step (arithmetic progression). -37 + (-8) = -45.","explanation_id":"Barisan ini berubah dengan selisih tetap -8 di setiap langkah (barisan aritmetika). -37 + (-8) = -45."},{"id":996,"question":"What is 50% of 300?","question_id":"Berapa 50% dari 300?","options":["150","450","330","225"],"correct":0,"explanation":"50% of 300 = 50/100 x 300 = 150.","explanation_id":"50% dari 300 = 50/100 x 300 = 150."},{"id":997,"question":"In a certain code, BIRD is written as DKTF.\nHow is FUNC written in that code?","question_id":"Dalam sebuah kode rahasia, BIRD ditulis sebagai DKTF.\nBagaimana FUNC ditulis dalam kode itu?","options":["JYRG","GVOD","HWPE","IXQF"],"correct":2,"explanation":"Each letter shifts forward by 2 position(s) (wrapping Z->A). The same shift on FUNC gives HWPE.","explanation_id":"Setiap huruf digeser maju 2 posisi (memutar Z->A). Geseran yang sama pada FUNC menghasilkan HWPE."},{"id":998,"question":"What number comes next in the sequence?\n5, 2, 7, 9, 16, ?","question_id":"Angka berapa berikutnya dalam barisan ini?\n5, 2, 7, 9, 16, ?","options":["34","26","41","25"],"correct":3,"explanation":"Each term is the sum of the two before it. 9 + 16 = 25.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya. 9 + 16 = 25."},{"id":999,"question":"What number comes next in the sequence?\n18, 33, 48, 63, 78, ?","question_id":"Angka berapa yang muncul berikutnya dalam barisan ini?\n18, 33, 48, 63, 78, ?","options":["108","93","78","123"],"correct":1,"explanation":"The sequence changes by a constant difference of 15 each step (arithmetic progression). 78 + (15) = 93.","explanation_id":"Barisan ini berubah dengan selisih tetap 15 di setiap langkah (barisan aritmetika). 78 + (15) = 93."},{"id":1000,"question":"Which letter comes next?\nH, J, L, N, P, ?","question_id":"Huruf apa berikutnya?\nH, J, L, N, P, ?","options":["S","R","T","Q"],"correct":1,"explanation":"Each letter advances by 2 position(s) in the alphabet. After P, skipping 2, gives R.","explanation_id":"Setiap huruf maju 2 posisi dalam alfabet. Setelah P, lompat 2, menjadi R."}],"programming":[{"id":1,"question":"What is the output?\n```\nlet r = [3, 3, 8].reduce(3) { max($0, $1) }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["3","14","7","8"],"correct":3,"explanation":"reduce keeps the running maximum, giving 8 (the largest element).","explanation_id":"reduce menyimpan nilai maksimum berjalan, menghasilkan 8 (elemen terbesar)."},{"id":2,"question":"What is the output?\n```\nlet r = [5, 7, 3, 3, 2].map { $0 * 2 }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["[7, 9, 5, 5, 4]","[11, 15, 7, 7, 5]","[5, 7, 3, 3, 2]","[10, 14, 6, 6, 4]"],"correct":3,"explanation":"map multiplies every element by 2, giving [10, 14, 6, 6, 4].","explanation_id":"map mengalikan setiap elemen dengan 2, menghasilkan [10, 14, 6, 6, 4]."},{"id":3,"question":"What is the output?\n```\nlet r = [4, 8, 7].reduce(0, +)\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["19","20","8","18"],"correct":0,"explanation":"reduce(0, +) adds all elements: 4 + 8 + 7 = 19.","explanation_id":"reduce(0, +) menjumlahkan semua elemen: 4 + 8 + 7 = 19."},{"id":4,"question":"What is the output?\n```\nlet a = [8, 6, 3]\nprint(a.count)\n```","question_id":"Apa output yang tercetak?","options":["2","3","17","4"],"correct":1,"explanation":"count returns the number of elements, which is 3.","explanation_id":"count mengembalikan jumlah elemen, yaitu 3."},{"id":5,"question":"What is the time complexity of: Binary search on a sorted array of n items?","question_id":"Berapa kompleksitas waktu dari: binary search pada array terurut berisi n item?","options":["O(1)","O(log n)","O(n log n)","O(n)"],"correct":1,"explanation":"Binary search discards half the remaining items each step -> O(log n).","explanation_id":"Binary search membuang separuh sisa item tiap langkah -> O(log n)."},{"id":6,"question":"What is the output?\n```\nlet r = [9, 4, 6].map { $0 * $0 }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["[9, 4, 6]","[82, 17, 37]","[18, 8, 12]","[81, 16, 36]"],"correct":3,"explanation":"map squares every element, giving [81, 16, 36].","explanation_id":"map mengkuadratkan setiap elemen, menghasilkan [81, 16, 36]."},{"id":7,"question":"What is the output?\n```\nlet r = [2, 4, 7, 3].map { $0 * $0 }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["[4, 8, 14, 6]","[4, 16, 49, 9]","[2, 4, 7, 3]","[5, 17, 50, 10]"],"correct":1,"explanation":"map squares every element, giving [4, 16, 49, 9].","explanation_id":"map mengkuadratkan setiap elemen, menghasilkan [4, 16, 49, 9]."},{"id":8,"question":"What is the value of `result`?\n```\nlet result = 45 / 5\nprint(result)\n```","question_id":"Berapa nilai `result`?","options":["10","9","11","8"],"correct":1,"explanation":"Integer division 45/5 drops the fraction (Swift Int), giving 9.","explanation_id":"Pembagian bilangan bulat 45/5 membuang pecahannya (Int di Swift), hasilnya 9."},{"id":9,"question":"What is the output?\n```\nvar x = 12\nx *= 4\nx -= 7\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["41","40","42","43"],"correct":0,"explanation":"Apply each statement in order, starting from 12. The final value of x is 41.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 12. Nilai akhir x adalah 41."},{"id":10,"question":"What is the output?\n```\nvar x = 13\nx -= 4\nx -= 5\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["3","6","5","4"],"correct":3,"explanation":"Apply each statement in order, starting from 13. The final value of x is 4.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 13. Nilai akhir x adalah 4."},{"id":11,"question":"What is the output?\n```\nvar x = 8\nx += 5\nx += 9\nx *= 6\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["134","133","132","131"],"correct":2,"explanation":"Apply each statement in order, starting from 8. The final value of x is 132.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 8. Nilai akhir x adalah 132."},{"id":12,"question":"What is printed?\n```\nvar total = 0\nfor i in 1...5 {\n    total += i\n}\nprint(total)\n```","question_id":"Apa yang tercetak?","options":["20","16","10","15"],"correct":3,"explanation":"The loop adds 1+2+...+5 = n(n+1)/2 = 5x6/2 = 15.","explanation_id":"Loop menjumlahkan 1+2+...+5 = n(n+1)/2 = 5x6/2 = 15."},{"id":13,"question":"What is printed?\n```\nlet a = 21\nlet b = 17\nlet r = a <= b ? 23 : 25\nprint(r)\n```","question_id":"Apa yang tercetak?","options":["24","25","26","48"],"correct":1,"explanation":"The condition `21 <= 17` is false, so the ternary returns the second value: 25.","explanation_id":"Kondisi `21 <= 17` bernilai false, jadi ekspresi ternary mengembalikan nilai kedua: 25."},{"id":14,"question":"What is printed?\n```\nvar total = 0\nfor i in 1...6 {\n    total += i * i\n}\nprint(total)\n```","question_id":"Apa yang tercetak?","options":["127","92","90","91"],"correct":3,"explanation":"The loop adds 1^2+2^2+...+6^2 = 91.","explanation_id":"Loop menjumlahkan 1^2+2^2+...+6^2 = 91."},{"id":15,"question":"What is printed?\n```\nlet x: Int? = 7\nlet y = x ?? 35\nprint(y)\n```","question_id":"Apa yang tercetak?","options":["6","8","42","7"],"correct":3,"explanation":"x holds 7 (not nil), so `??` uses x's value 7; the default 35 is ignored.","explanation_id":"x berisi 7 (bukan nil), jadi `??` memakai nilai x yaitu 7; nilai cadangan 35 diabaikan."},{"id":16,"question":"How many times does this loop run?\n```\nfor i in 5..<11 {\n    print(i)\n}\n```","question_id":"Berapa kali loop ini berjalan?","options":["7","5","6","17"],"correct":2,"explanation":"`5..<11` is a half-open range that EXCLUDES 11: it has 6 values (5 through 10).","explanation_id":"`5..<11` adalah rentang setengah terbuka yang TIDAK termasuk 11: ada 6 nilai (5 sampai 10)."},{"id":17,"question":"What is printed?\n```\nlet s = \"class\"\nprint(String(s.reversed()))\n```","question_id":"Apa yang tercetak?","options":["\"lassc\"","\"class\"","\"SSALC\"","\"ssalc\""],"correct":3,"explanation":"reversed() flips the character order: \"ssalc\".","explanation_id":"reversed() membalik urutan karakter: \"ssalc\"."},{"id":18,"question":"What is the output?\n```\nvar x = 20\nx *= 9\nx *= 9\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["1619","1620","1622","1621"],"correct":1,"explanation":"Apply each statement in order, starting from 20. The final value of x is 1620.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 20. Nilai akhir x adalah 1620."},{"id":19,"question":"What is the output?\n```\nvar x = 1\nx += 8\nx *= 7\nx += 7\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["70","71","69","72"],"correct":0,"explanation":"Apply each statement in order, starting from 1. The final value of x is 70.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 1. Nilai akhir x adalah 70."},{"id":20,"question":"What does `map` do to a collection in Swift?","question_id":"Apa yang dilakukan `map` pada sebuah koleksi di Swift?","options":["Sorts the collection in place","Removes elements that fail a test","Returns a new array by transforming each element","Combines all elements into one value"],"correct":2,"explanation":"`map` applies a transform to every element and returns a new collection of the results.","explanation_id":"`map` menerapkan transformasi ke tiap elemen dan mengembalikan koleksi baru berisi hasilnya.","options_id":["Mengurutkan koleksi di tempat","Membuang elemen yang gagal sebuah uji","Mengembalikan array baru dengan mengubah tiap elemen","Menggabungkan semua elemen jadi satu nilai"]},{"id":21,"question":"What is the output?\n```\nvar x = 7\nx -= 6\nx -= 8\nx += 1\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["-5","-4","-7","-6"],"correct":3,"explanation":"Apply each statement in order, starting from 7. The final value of x is -6.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 7. Nilai akhir x adalah -6."},{"id":22,"question":"What is the output?\n```\nvar x = 10\nx *= 2\nx *= 5\nx += 6\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["108","105","106","107"],"correct":2,"explanation":"Apply each statement in order, starting from 10. The final value of x is 106.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 10. Nilai akhir x adalah 106."},{"id":23,"question":"What is the value of `result`?\n```\nlet result = 20 / 10\nprint(result)\n```","question_id":"Berapa nilai `result`?","options":["1","3","2","4"],"correct":2,"explanation":"Integer division 20/10 drops the fraction (Swift Int), giving 2.","explanation_id":"Pembagian bilangan bulat 20/10 membuang pecahannya (Int di Swift), hasilnya 2."},{"id":24,"question":"What does `sumTo(3)` return?\n```\nfunc sumTo(_ n: Int) -> Int {\n    if n == 0 { return 0 }\n    return n + sumTo(n - 1)\n}\n```","question_id":"Apa yang dikembalikan `sumTo(3)`?","options":["6","5","9","7"],"correct":0,"explanation":"It adds n + (n-1) + ... + 1 = 3(3+1)/2 = 6.","explanation_id":"Fungsi ini menjumlahkan n + (n-1) + ... + 1 = 3(3+1)/2 = 6."},{"id":25,"question":"What is printed?\n```\nlet x: Int? = nil\nlet y = x ?? 20\nprint(y)\n```","question_id":"Apa yang tercetak?","options":["19","41","21","20"],"correct":3,"explanation":"x is nil, so `??` falls back to the default value 20.","explanation_id":"x bernilai nil, jadi `??` memakai nilai cadangan 20."},{"id":26,"question":"What does `sumTo(9)` return?\n```\nfunc sumTo(_ n: Int) -> Int {\n    if n == 0 { return 0 }\n    return n + sumTo(n - 1)\n}\n```","question_id":"Apa yang dikembalikan `sumTo(9)`?","options":["81","46","54","45"],"correct":3,"explanation":"It adds n + (n-1) + ... + 1 = 9(9+1)/2 = 45.","explanation_id":"Fungsi ini menjumlahkan n + (n-1) + ... + 1 = 9(9+1)/2 = 45."},{"id":27,"question":"What is the output?\n```\nlet r = [2, 6, 4, 1].map { $0 * 2 }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["[4, 12, 8, 2]","[5, 13, 9, 3]","[2, 6, 4, 1]","[4, 8, 6, 3]"],"correct":0,"explanation":"map multiplies every element by 2, giving [4, 12, 8, 2].","explanation_id":"map mengalikan setiap elemen dengan 2, menghasilkan [4, 12, 8, 2]."},{"id":28,"question":"What is printed?\n```\nlet a = 27\nlet b = 1\nlet r = a < b ? 92 : 45\nprint(r)\n```","question_id":"Apa yang tercetak?","options":["45","46","44","137"],"correct":0,"explanation":"The condition `27 < 1` is false, so the ternary returns the second value: 45.","explan  problem here?\n```\nlet name: String? = nil\nprint(name!)\n```","question_id":"Apa masalahnya di sini?","options":["Force-unwrapping a nil optional crashes at runtime","`String?` is not a valid type","`nil` must be in quotes","`print` needs a format string"],"correct":0,"explanation":"`!` force-unwraps; if the optional is nil this triggers a fatal runtime error. Use `if let` or `??`.","explanation_id":"`!` membuka paksa; jika optional-nya nil ini memicu error fatal saat runtime. Pakai `if let` atau `??`.","options_id":["Membuka paksa optional yang nil membuat crash saat runtime","`String?` bukan tipe yang sah","`nil` harus dalam tanda kutip","`print` butuh format string"]},{"id":329,"question":"What is the value of `result`?\n```\nlet result = 64 % 10\nprint(result)\n```","question_id":"Berapa nilai `result`?","options":["5","4","6","3"],"correct":1,"explanation":"`%` gives the remainder of 64 divided by 10, which is 4.","explanation_id":"`%` memberi sisa bagi dari 64 dibagi 10, yaitu 4."},{"id":330,"question":"What is the output?\n```\nlet r = [8, 8, 7, 4].map { $0 * $0 }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["[65, 65, 50, 17]","[16, 16, 14, 8]","[8, 8, 7, 4]","[64, 64, 49, 16]"],"correct":3,"explanation":"map squares every element, giving [64, 64, 49, 16].","explanation_id":"map mengkuadratkan setiap elemen, menghasilkan [64, 64, 49, 16]."},{"id":331,"question":"What does `fib(10)` return?\n```\nfunc fib(_ n: Int) -> Int {\n    if n < 2 { return n }\n    return fib(n - 1) + fib(n - 2)\n}\n```","question_id":"Apa yang dikembalikan `fib(10)`?","options":["55","54","56","89"],"correct":0,"explanation":"fib(0)=0, fib(1)=1, and each later value is the sum of the two before it. fib(10) = 55.","explanation_id":"fib(0)=0, fib(1)=1, dan tiap nilai berikutnya adalah jumlah dua sebelumnya. fib(10) = 55."},{"id":332,"question":"What is printed?\n```\nlet a = 23\nlet b = 29\nlet r = a <= b ? 99 : 5\nprint(r)\n```","question_id":"Apa yang terceta oes the `guard` statement do in Swift?","question_id":"Apa fungsi pernyataan `guard` di Swift?","options":["Loops until a condition becomes true","Exits the current scope early if a condition is not met, otherwise continues","Declares a constant that cannot change","Catches and handles thrown errors"],"correct":1,"explanation":"`guard` requires a condition to hold; if it fails the `else` block must exit the scope, keeping the happy path flat.","explanation_id":"`guard` mewajibkan sebuah kondisi benar; jika gagal, blok `else` harus keluar dari scope, sehingga alur utama tetap rata.","options_id":["Mengulang sampai sebuah kondisi menjadi true","Keluar lebih awal dari scope saat ini jika kondisi tidak terpenuhi, jika terpenuhi lanjut","Mendeklarasikan konstanta yang tak bisa berubah","Menangkap dan menangani error yang dilempar"]},{"id":350,"question":"What is the output?\n```\nvar x = 13\nx *= 8\nx -= 3\nprint(x)\n```","question_id":"Apa output yang tercetak?","options":["101","103","100","102"],"correct":0,"explanation":"Apply each statement in order, starting from 13. The final value of x is 101.","explanation_id":"Jalankan tiap pernyataan berurutan, mulai dari 13. Nilai akhir x adalah 101."},{"id":351,"question":"What is the value of `result`?\n```\nlet result = 40 / 11\nprint(result)\n```","question_id":"Berapa nilai `result`?","options":["5","2","4","3"],"correct":3,"explanation":"Integer division 40/11 drops the fraction (Swift Int), giving 3.","explanation_id":"Pembagian bilangan bulat 40/11 membuang pecahannya (Int di Swift), hasilnya 3."},{"id":352,"question":"What is the output?\n```\nlet r = [2, 9, 9].reduce(0, +)\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["20","21","19","9"],"correct":0,"explanation":"reduce(0, +) adds all elements: 2 + 9 + 9 = 20.","explanation_id":"reduce(0, +) menjumlahkan semua elemen: 2 + 9 + 9 = 20."},{"id":353,"question":"What is printed?\n```\nlet x: Int? = 49\nlet y = x ?? 39\nprint(y)\n```","question_id"  the loop run (value of `c`)?\n```\nvar n = 48\nvar c = 0\nwhile n >= 1 {\n    n = n / 2\n    c += 1\n}\nprint(c)\n```","question_id":"Berapa kali loop berjalan (nilai `c`)?","options":["8","7","5","6"],"correct":3,"explanation":"n is halved with integer division each pass until it reaches 0. That takes 6 iterations (about log2 of 48).","explanation_id":"n dibagi dua (pembagian bulat) tiap putaran sampai jadi 0. Itu butuh 6 iterasi (sekitar log2 dari 48)."},{"id":993,"question":"What is printed?\n```\nlet s = \"value\"\nprint(s.count)\n```","question_id":"Apa yang tercetak?","options":["13","6","5","4"],"correct":2,"explanation":"\"value\" has 5 characters.","explanation_id":"\"value\" punya 5 karakter."},{"id":994,"question":"What is printed?\n```\nlet s = \"swift\"\nprint(s.hasPrefix(\"sw\"))\n```","question_id":"Apa yang tercetak?","options":["nil","true","\"sw\"","false"],"correct":1,"explanation":"\"swift\" does start with \"sw\", so hasPrefix returns true.","explanation_id":"\"swift\" memang diawali \"sw\", jadi hasPrefix mengembalikan true."},{"id":995,"question":"What is the output?\n```\nlet r = [7, 6, 3, 1].map { $0 * $0 }\nprint(r)\n```","question_id":"Apa output yang tercetak?","options":["[14, 12, 6, 2]","[49, 36, 9, 1]","[7, 6, 3, 1]","[50, 37, 10, 2]"],"correct":1,"explanation":"map squares every element, giving [49, 36, 9, 1].","explanation_id":"map mengkuadratkan setiap elemen, menghasilkan [49, 36, 9, 1]."},{"id":996,"question":"What is printed?\n```\nlet a = 8\nlet b = 25\nlet r = a >= b ? 65 : 90\nprint(r)\n```","question_id":"Apa yang tercetak?","options":["89","90","155","91"],"correct":1,"explanation":"The condition `8 >= 25` is false, so the ternary returns the second value: 90.","explanation_id":"Kondisi `8 >= 25` bernilai false, jadi ekspresi ternary mengembalikan nilai kedua: 90."},{"id":997,"question":"What is the value of `result`?\n```\nlet result = 9 / 2\nprint(result)\n```","question_id":"Berapa nilai `result`?","options":["6","4","3","5"],"correct":1,"explanation":"Integer division 9/2 drops the fraction (Swift Int), giving 4.","explanation_id":"Pembagian bilangan bulat 9/2 membuang pecahannya (Int di Swift), hasilnya 4."},{"id":998,"question":"How many times does this loop run?\n```\nfor i in 9...17 {\n    print(i)\n}\n```","question_id":"Berapa kali loop ini berjalan?","options":["26","9","10","8"],"correct":1,"explanation":"`9...17` is a closed range that INCLUDES 17: it has 9 values (9 through 17).","explanation_id":"`9...17` adalah rentang tertutup yang TERMASUK 17: ada 9 nilai (9 sampai 17)."},{"id":999,"question":"What is printed?\n```\nlet x: Int? = 18\nlet y = x ?? 28\nprint(y)\n```","question_id":"Apa yang tercetak?","options":["18","17","46","19"],"correct":0,"explanation":"x holds 18 (not nil), so `??` uses x's value 18; the default 28 is ignored.","explanation_id":"x berisi 18 (bukan nil), jadi `??` memakai nilai x yaitu 18; nilai cadangan 28 diabaikan."},{"id":1000,"question":"What is printed?\n```\nlet s = \"stack\"\nprint(s.uppercased())\n```","question_id":"Apa yang tercetak?","options":["\"stack\"","\"KCATS\"","\"Stack\"","\"STACK\""],"correct":3,"explanation":"uppercased() converts every letter to upper case: \"STACK\".","explanation_id":"uppercased() mengubah semua huruf jadi huruf besar: \"STACK\"."}]}</script>
<script>
const BANK=JSON.parse(document.getElementById('bank').textContent);
const ABC=['A','B','C','D'];
const PER=BANK.meta.questionsPerSession;
const OFFLINE=location.protocol==='file:';   // opened as a file -> local only

// ---------- score storage: cloud (Aiven via server) with localStorage fallback ----------
const ls={get(k){try{return JSON.parse(localStorage.getItem('aq_'+k));}catch(e){return null;}},
          set(k,v){try{localStorage.setItem('aq_'+k,JSON.stringify(v));}catch(e){}}};
let PLAYER=ls.get('player')||'me';
let remote={};            // {'logic:0':47,...} from server
let syncState=OFFLINE?'local':'connecting';

async function loadScores(){
  if(OFFLINE){syncState='local';return;}
  try{
    const r=await fetch('/api/scores?player='+encodeURIComponent(PLAYER));
    if(r.ok){remote=await r.json();syncState='cloud';}
    else{syncState='local';}
  }catch(e){syncState='local';}
}
function bestOf(topic,session){
  const k=topic+':'+session;
  if(syncState==='cloud' && k in remote) return remote[k];
  return ls.get(k);
}
async function saveScore(topic,session,score){
  const k=topic+':'+session;
  const localBest=Math.max(score, ls.get(k)??0); ls.set(k,localBest);   // always cache locally
  if(OFFLINE) return;
  try{
    const r=await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({player:PLAYER,topic,session,score,total:PER})});
    if(r.ok){const d=await r.json(); remote[k]=d.best; syncState='cloud';}
    else{syncState='local';}
  }catch(e){syncState='local';}
}

// ---------- text rendering ----------
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function inlineCode(s){return esc(s).split('`').map((p,i)=>i%2?'<code>'+p+'</code>':p).join('');}
function fmtFull(t){return t.split('```').map((seg,i)=>i%2?'<pre>'+esc(seg.replace(/^\n|\n$/g,''))+'</pre>':inlineCode(seg)).join('');}
function fmtNoCode(t){ // for the ID line of a question: drop code blocks (already shown in EN)
  return t.split('```').filter((_,i)=>i%2===0).map(inlineCode).join('').trim();
}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildAttempt(topic,session){
  const slice=BANK[topic].slice(session*PER,session*PER+PER);
  return shuffle(slice).map(q=>{
    const order=shuffle([0,1,2,3]);
    return {question:q.question,question_id:q.question_id,explanation:q.explanation,explanation_id:q.explanation_id,
            options:order.map(i=>q.options[i]),
            options_id:q.options_id?order.map(i=>q.options_id[i]):null,
            correct:order.indexOf(q.correct)};
  });
}

let S={screen:'home',topic:'logic'};
function startSession(topic,session){
  S={screen:'quiz',topic,session,qs:buildAttempt(topic,session),idx:0,selected:null,score:0,reviewed:[]};
  render();
}
function pick(i){
  if(S.selected!==null)return; S.selected=i;
  const q=S.qs[S.idx],ok=i===q.correct; if(ok)S.score++;
  S.reviewed.push({...q,picked:i,ok}); render();
}
function advance(){
  if(S.idx+1>=S.qs.length){ saveScore(S.topic,S.session,S.score).then(()=>{if(S.screen==='results')render();}); S.screen='results'; }
  else{S.idx++;S.selected=null;}
  render();
}
function setPlayer(v){
  PLAYER=(v||'me').trim()||'me'; ls.set('player',PLAYER);
  syncState=OFFLINE?'local':'connecting'; render();
  loadScores().then(render);
}

// ---------- views ----------
function syncBadge(){
  const map={cloud:['☁︎ Cloud (Aiven)','rgba(50,215,75,.16)','#32D74B'],
             local:['● Saved on this device','rgba(255,159,10,.16)','#FF9F0A'],
             connecting:['… connecting','rgba(255,255,255,.08)','#8E8E93']};
  const [t,bg,c]=map[syncState]||map.local;
  return `<span class="sync" style="background:${bg};color:${c}">${t}</span>`;
}
function homeView(){
  const t=S.topic,info=BANK.meta.topics[t],n=info.sessions;
  let cells='';
  for(let s=0;s<n;s++){
    const best=bestOf(t,s),done=best!==null&&best!==undefined;
    const pct=done?Math.round(best/PER*100):0;
    const col=pct>=85?'var(--green)':pct>=55?'var(--teal)':pct>=40?'var(--orange)':'var(--red)';
    cells+=`<button class="cell ${done?'done':''}" onclick="startSession('${t}',${s})">
      <span class="n">${s+1}</span><span class="lbl">${done?'best':'50 Q'}</span>
      ${done?`<span class="best" style="color:${col}">${best}/${PER}</span>`:''}</button>`;
  }
  return `<div class="center"><div class="brand">
      <div class="logo">🍎</div><h1>Academy Quiz Prep</h1>
      <p class="sub">Apple Developer Academy Indonesia</p>
      <span class="pill">${info.total} soal · ${n} sesi · EN + ID</span></div></div>
    <div class="who">
      <label>Nama / Name:</label>
      <input id="pname" value="${PLAYER.replace(/"/g,'&quot;')}" onchange="setPlayer(this.value)" placeholder="me">
      ${syncBadge()}
    </div>
    <div class="tabs">
      <button class="tab logic ${t==='logic'?'active':''}" onclick="S.topic='logic';render()">🧠 Logic / Logika</button>
      <button class="tab programming ${t==='programming'?'active':''}" onclick="S.topic='programming';render()">💻 Programming</button>
    </div>
    <p class="meta">${t==='logic'
      ?'Sequences · Patterns · Analogies · Syllogisms · Coding · Matrices<br><span class="id">Barisan · Pola · Analogi · Silogisme · Sandi · Matriks</span>'
      :'Swift tracing · OOP · Data structures · Algorithms · Big-O · Debugging<br><span class="id">Telusur kode Swift · OOP · Struktur data · Algoritma · Big-O · Cari bug</span>'}
      <br>Pick a session — 50 questions each · no timer<br><span class="id">Pilih satu sesi — 50 soal per sesi · tanpa timer</span></p>
    <div class="grid">${cells}</div>
    <p class="foot">${OFFLINE
      ?'Opened as a file — scores save on this device only.<br><span class="id">Dibuka sebagai file — skor hanya tersimpan di perangkat ini.</span>'
      :'Scores sync to your database when the server is running.<br><span class="id">Skor tersinkron ke database-mu saat server menyala.</span>'}</p>`;
}

function quizView(){
  const q=S.qs[S.idx],num=S.idx+1,total=S.qs.length;
  const answered=S.selected!==null,isRight=S.selected===q.correct;
  let opts='';
  q.options.forEach((o,i)=>{
    let cls='opt';
    if(answered){ if(i===q.correct)cls+=' correct'; else if(i===S.selected)cls+=' wrong'; else cls+=' faded'; }
    let badge=ABC[i];
    if(answered&&i===q.correct)badge='✓'; else if(answered&&i===S.selected)badge='✗';
    const oid=(q.options_id&&q.options_id[i]&&q.options_id[i]!==o)?`<span class="oid">${fmtFull(q.options_id[i])}</span>`:'';
    opts+=`<button class="${cls}" ${answered?'disabled':''} onclick="pick(${i})">
      <span class="badge">${badge}</span><span class="otxt"><span>${fmtFull(o)}</span>${oid}</span></button>`;
  });
  const expl=answered?`
    <div class="expl ${isRight?'ok':'no'}">
      <p class="h">${isRight?'✓ Correct! / Benar!':'✗ Incorrect — correct answer '+ABC[q.correct]+' / Salah — jawaban benar '+ABC[q.correct]}</p>
      <p class="en">${inlineCode(q.explanation)}</p>
      <p class="id">${inlineCode(q.explanation_id)}</p>
    </div>
    <button class="next" onclick="advance()">${num<total?'Next / Lanjut →':'See Results / Lihat Hasil 🎯'}</button>`:'';
  return `<div class="bar"><i style="width:${(num-1)/total*100}%"></i></div>
    <div class="top">
      <span class="t">${S.topic==='logic'?'🧠 Logic':'💻 Programming'} · S${S.session+1}</span>
      <span class="qn">Q${num} <span>/ ${total}</span></span>
      <span class="sc">✓ ${S.score}</span></div>
    <div class="card"><div class="en">${fmtFull(q.question)}</div><div class="id">${fmtNoCode(q.question_id)}</div></div>
    <div class="opts">${opts}</div>${expl}`;
}

function resultsView(){
  const score=S.score,total=S.qs.length,pct=Math.round(score/total*100);
  const wrong=S.reviewed.filter(r=>!r.ok);
  const g=pct>=85?['Outstanding! 🔥','var(--green)']:pct>=70?['Great job! 💪','var(--teal)']
        :pct>=55?['Good effort! 📚','var(--blue)']:pct>=40?['Keep going! 🚀','var(--orange)']:["Don't give up! 💡",'var(--red)'];
  let wrongHtml;
  if(wrong.length){
    const boxes=wrong.map(r=>{
      const yid=(r.options_id&&r.options_id[r.picked]&&r.options_id[r.picked]!==r.options[r.picked])?` <span class="id">(${fmtNoCode(r.options_id[r.picked])})</span>`:'';
      const cid=(r.options_id&&r.options_id[r.correct]&&r.options_id[r.correct]!==r.options[r.correct])?` <span class="id">(${fmtNoCode(r.options_id[r.correct])})</span>`:'';
      return `<div class="wbox">
        <p class="q">${fmtFull(r.question)}<br><span class="id">${fmtNoCode(r.question_id)}</span></p>
        <p class="ya">✗ You / Kamu: ${fmtFull(r.options[r.picked])}${yid}</p>
        <p class="ca">✓ Correct / Benar: ${fmtFull(r.options[r.correct])}${cid}</p>
        <p class="ex">${inlineCode(r.explanation)}<br><span class="id">${inlineCode(r.explanation_id)}</span></p></div>`;}).join('');
    wrongHtml=`<button class="toggle" onclick="(function(e){e.style.display=e.style.display==='none'?'flex':'none'})(document.getElementById('wl'))">
        ▼ Review ${wrong.length} wrong / Tinjau ${wrong.length} salah</button>
      <div class="wrongs" id="wl" style="display:none">${boxes}</div>`;
  }else{
    wrongHtml=`<div class="perfect">🎯 Perfect session! / Sesi sempurna!</div>`;
  }
  return `<div class="score-card">
      <p class="sub">${S.topic==='logic'?'🧠 Logic':'💻 Programming'} · Session ${S.session+1} complete / selesai · ${syncBadge()}</p>
      <div class="ring" style="border-color:${g[1]}"><span class="big" style="color:${g[1]}">${score}</span><span class="of">/ ${total}</span></div>
      <h1 style="font-size:22px">${g[0]}</h1><p class="sub" style="margin:5px 0 0">${pct}% accuracy / akurasi</p></div>
    <div class="chips">
      <div class="chip"><div class="v" style="color:var(--green)">${score}</div><div class="l">Correct / Benar</div></div>
      <div class="chip"><div class="v" style="color:var(--red)">${wrong.length}</div><div class="l">Wrong / Salah</div></div>
      <div class="chip"><div class="v" style="color:var(--indigo)">${pct}%</div><div class="l">Score / Nilai</div></div></div>
    <div class="row">
      <button class="ghost" onclick="S.screen='home';render()">← Home</button>
      <button class="next" style="flex:2" onclick="startSession('${S.topic}',${S.session})">Retry / Ulangi →</button></div>
    ${wrongHtml}`;
}

function render(){
  const el=document.getElementById('app');
  el.innerHTML=S.screen==='quiz'?quizView():S.screen==='results'?resultsView():homeView();
  window.scrollTo(0,0);
}
render();
loadScores().then(render);
</script>
</body>
</html>
